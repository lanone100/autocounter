<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>智慧物件計數</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --ink:    #0a0a0f;
  --ink2:   #1c1c28;
  --ink3:   #2e2e42;
  --dim:    #6b6b88;
  --muted:  #a0a0b8;
  --line:   rgba(255,255,255,0.06);
  --glass:  rgba(255,255,255,0.04);
  --acid:   #c6ff00;
  --cyan:   #00e5ff;
  --amber:  #ffb300;
  --rose:   #ff4f6e;
  --violet: #a855f7;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--ink);
  color: #fff;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── LAYOUT ─── */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* ─── HEADER ─── */
.hdr {
  padding: env(safe-area-inset-top, 44px) 20px 0;
  background: var(--ink);
  position: sticky; top: 0; z-index: 100;
}
.hdr-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 16px;
  border-bottom: 1px solid var(--line);
}
.logo {
  display: flex; flex-direction: column; gap: 2px;
}
.logo-title {
  font-family: var(--mono);
  font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
  color: var(--acid);
}
.logo-sub {
  font-size: 11px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase;
}
.hdr-right { display: flex; gap: 8px; }
.pill-btn {
  height: 34px; padding: 0 14px; border-radius: 17px;
  border: 1px solid var(--line); background: var(--glass);
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.pill-btn:active { transform: scale(0.93); }
.pill-btn.active { border-color: var(--acid); color: var(--acid); background: rgba(198,255,0,0.08); }

/* ─── VIEWPORT ─── */
.vp-wrap {
  position: relative;
  background: #000;
  /* 4:3 aspect */
  aspect-ratio: 4/3;
  overflow: hidden;
}
video, #canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
video { opacity: 0; }

/* Corner brackets */
.corner {
  position: absolute; width: 22px; height: 22px;
  z-index: 5; pointer-events: none;
  transition: opacity 0.3s;
}
.corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--acid); border-left: 2px solid var(--acid); border-radius: 3px 0 0 0; }
.corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--acid); border-right: 2px solid var(--acid); border-radius: 0 3px 0 0; }
.corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--acid); border-left: 2px solid var(--acid); border-radius: 0 0 0 3px; }
.corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--acid); border-right: 2px solid var(--acid); border-radius: 0 0 3px 0; }

/* Scan line */
#scanline {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan) 30%, var(--acid) 70%, transparent);
  box-shadow: 0 0 10px var(--cyan);
  z-index: 4; pointer-events: none;
  opacity: 0; transition: opacity 0.4s;
  animation: scanMove 2s linear infinite;
}
#scanline.on { opacity: 1; }
@keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

/* Flash */
#flash {
  position: absolute; inset: 0; background: #fff;
  opacity: 0; pointer-events: none; z-index: 20;
  transition: opacity 0.06s;
}
#flash.on { opacity: 0.6; }

/* Big count overlay */
#big-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 36px 18px 18px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  z-index: 6; pointer-events: none;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.count-display {
  display: flex; flex-direction: column;
}
.count-num {
  font-family: var(--mono);
  font-size: 72px; font-weight: 700; line-height: 1;
  letter-spacing: -3px; color: #fff;
  text-shadow: 0 0 40px rgba(198,255,0,0.6);
  transition: color 0.3s;
}
.count-num.has-target { color: var(--acid); }
.count-label {
  font-size: 12px; color: rgba(255,255,255,0.5);
  font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase;
  margin-top: 2px;
}

/* Target badge in viewport */
#target-badge {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 7; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--acid);
  border-radius: 20px; padding: 6px 14px;
  backdrop-filter: blur(12px);
  opacity: 0; transition: opacity 0.3s;
}
#target-badge.show { opacity: 1; }
.tb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--acid); animation: pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
#tb-label { font-family: var(--mono); font-size: 12px; color: var(--acid); letter-spacing: 0.5px; }

/* Tap hint */
#tap-hint {
  position: absolute; inset: 0; z-index: 8;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; transition: opacity 0.5s;
}
#tap-hint.hidden { opacity: 0; }
.hint-ring {
  width: 70px; height: 70px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  animation: ring-pulse 2s ease infinite;
  position: relative;
}
.hint-ring::before {
  content: '';
  position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  animation: ring-pulse 2s ease infinite 0.3s;
}
@keyframes ring-pulse { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.1);opacity:1} }
.hint-icon { font-size: 28px; }
.hint-text { margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

/* Ripple on tap */
.tap-ripple {
  position: absolute; border-radius: 50%;
  width: 60px; height: 60px;
  border: 2px solid var(--acid);
  transform: translate(-50%, -50%) scale(0);
  pointer-events: none; z-index: 15;
  animation: ripple-out 0.5s ease-out forwards;
}
@keyframes ripple-out {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
}

/* Loading overlay */
#load-ov {
  position: absolute; inset: 0; background: rgba(10,10,15,0.95);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 30; transition: opacity 0.5s;
}
#load-ov.gone { opacity: 0; pointer-events: none; }
.load-ring {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid rgba(198,255,0,0.15);
  border-top-color: var(--acid);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt {
  font-family: var(--mono); font-size: 11px;
  color: var(--dim); letter-spacing: 1.5px;
  text-transform: uppercase; text-align: center; line-height: 2;
}

/* ─── CONTROLS ─── */
.controls {
  padding: 16px 20px;
  display: flex; gap: 10px; align-items: center;
}
.ctrl-btn {
  flex: 1; height: 48px; border-radius: 12px;
  border: 1px solid var(--line); background: var(--glass);
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all 0.18s; -webkit-tap-highlight-color: transparent; letter-spacing: 0.5px;
}
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn.primary {
  background: var(--acid); border-color: var(--acid);
  color: #000; font-weight: 700;
  box-shadow: 0 0 20px rgba(198,255,0,0.3);
}
.ctrl-btn.primary:active { background: #b0e600; }
.ctrl-btn.danger { border-color: rgba(255,79,110,0.4); color: var(--rose); }
.ctrl-btn.danger:active { background: rgba(255,79,110,0.1); }
.ctrl-btn svg { flex-shrink: 0; }

/* ─── STATS PANEL ─── */
.stats-panel {
  margin: 0 20px;
  background: var(--ink2);
  border-radius: 16px;
  border: 1px solid var(--line);
  overflow: hidden;
}
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
}
.stat-cell {
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 4px;
  border-right: 1px solid var(--line);
}
.stat-cell:last-child { border-right: none; }
.sc-label {
  font-size: 10px; color: var(--dim);
  font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase;
}
.sc-val {
  font-family: var(--mono); font-size: 20px; font-weight: 700;
  color: #fff; letter-spacing: -0.5px;
  transition: color 0.3s;
}
.sc-val.hi { color: var(--acid); }

/* ─── RESULT CARD ─── */
.result-card {
  margin: 12px 20px 0;
  background: var(--ink2); border-radius: 16px;
  border: 1px solid var(--line);
  overflow: hidden;
  max-height: 0; transition: max-height 0.4s ease, opacity 0.3s;
  opacity: 0;
}
.result-card.show { max-height: 500px; opacity: 1; }
.rc-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.rc-title { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
.rc-count-badge {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  background: rgba(198,255,0,0.1); color: var(--acid);
  padding: 3px 12px; border-radius: 20px;
  border: 1px solid rgba(198,255,0,0.2);
}
.rc-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.rc-class-row {
  display: flex; align-items: center; gap: 10px;
}
.rc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rc-class-name { font-size: 14px; font-weight: 600; flex: 1; }
.rc-bar-wrap { flex: 2; height: 4px; background: var(--ink3); border-radius: 2px; overflow: hidden; }
.rc-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.rc-class-n { font-family: var(--mono); font-size: 13px; color: var(--muted); min-width: 28px; text-align: right; }

/* ─── CONF SLIDER ─── */
.slider-row {
  margin: 12px 20px 0;
  background: var(--ink2); border-radius: 16px;
  border: 1px solid var(--line);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.sl-label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 1px; white-space: nowrap; }
input[type=range] {
  flex: 1; height: 3px; border-radius: 2px;
  -webkit-appearance: none; appearance: none; outline: none; cursor: pointer;
  background: linear-gradient(90deg, var(--acid) var(--pct,36%), var(--ink3) var(--pct,36%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #fff; border: 2px solid var(--acid);
  box-shadow: 0 0 10px rgba(198,255,0,0.5);
}
.sl-val { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--acid); min-width: 36px; text-align: right; }

/* ─── HISTORY ─── */
.history-section {
  margin: 12px 20px 0;
  background: var(--ink2); border-radius: 16px;
  border: 1px solid var(--line); overflow: hidden;
}
.hs-head {
  padding: 14px 16px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.hs-title { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
.hs-clear { background: none; border: none; font-family: var(--mono); font-size: 11px; color: var(--dim); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.hs-clear:active { color: var(--rose); }
.hist-list { max-height: 220px; overflow-y: auto; }
.hist-empty { text-align: center; padding: 20px; font-size: 12px; color: var(--dim); font-family: var(--mono); }
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  animation: slide-down 0.2s ease;
}
.hist-item:last-child { border-bottom: none; }
@keyframes slide-down { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
.hist-thumb {
  width: 48px; height: 36px; border-radius: 7px;
  object-fit: cover; border: 1px solid var(--line); flex-shrink: 0;
}
.hist-info { flex: 1; }
.hi-target {
  font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--acid);
}
.hi-meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
.hi-n { font-family: var(--mono); font-size: 18px; font-weight: 700; color: #fff; }
.hist-del { background: none; border: none; color: var(--dim); font-size: 16px; cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--ink3); border-radius: 2px; }

/* ─── MODE INDICATOR ─── */
.mode-chip {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.5px;
}
.mode-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); }
.mode-dot.live { background: var(--acid); animation: live-blink 1.5s ease infinite; }
@keyframes live-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.mode-dot.frozen { background: var(--cyan); animation: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-inner">
      <div class="logo">
        <div class="logo-title">COUNT//AI</div>
        <div class="logo-sub">點選 · 識別 · 計數</div>
      </div>
      <div class="hdr-right">
        <button class="pill-btn" id="flipBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          翻轉
        </button>
        <button class="pill-btn" id="themeBtn">☀</button>
      </div>
    </div>
  </div>

  <!-- VIEWPORT -->
  <div class="vp-wrap" id="vpWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="scanline"></div>
    <div id="flash"></div>

    <!-- target badge -->
    <div id="target-badge">
      <div class="tb-dot"></div>
      <span id="tb-label">—</span>
    </div>

    <!-- big count -->
    <div id="big-overlay">
      <div class="count-display">
        <div class="count-num" id="bigNum">0</div>
        <div class="count-label" id="countLabel">件物件</div>
      </div>
      <div class="mode-chip">
        <div class="mode-dot live" id="modeDot"></div>
        <span id="modeLabel">LIVE</span>
      </div>
    </div>

    <!-- tap hint -->
    <div id="tap-hint">
      <div class="hint-ring"><div class="hint-icon">👆</div></div>
      <div class="hint-text">點選畫面中的物件開始計數</div>
    </div>

    <!-- loading -->
    <div id="load-ov">
      <div class="load-ring"></div>
      <div class="load-txt" id="loadTxt">載入 AI 模型中<br>首次約 15MB</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="btnFreeze">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      凍結
    </button>
    <button class="ctrl-btn primary" id="btnLive">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      直播
    </button>
    <button class="ctrl-btn" id="btnSave">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      儲存
    </button>
    <button class="ctrl-btn danger" id="btnClear">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      清除
    </button>
  </div>

  <!-- STATS PANEL -->
  <div class="stats-panel">
    <div class="stats-row">
      <div class="stat-cell">
        <div class="sc-label">目標計數</div>
        <div class="sc-val hi" id="stTarget">0</div>
      </div>
      <div class="stat-cell">
        <div class="sc-label">全部物件</div>
        <div class="sc-val" id="stAll">0</div>
      </div>
      <div class="stat-cell">
        <div class="sc-label">信心最高</div>
        <div class="sc-val" id="stConf">—</div>
      </div>
    </div>
  </div>

  <!-- RESULT CARD -->
  <div class="result-card" id="resultCard">
    <div class="rc-head">
      <div class="rc-title" id="rcTitle">— 物件分類</div>
      <div class="rc-count-badge" id="rcBadge">0 件</div>
    </div>
    <div class="rc-body" id="rcBody"></div>
  </div>

  <!-- CONF SLIDER -->
  <div class="slider-row">
    <div class="sl-label">信心閾值</div>
    <input type="range" id="confSlider" min="10" max="90" value="40">
    <div class="sl-val" id="confVal">40%</div>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="hs-head">
      <div class="hs-title">// 儲存紀錄</div>
      <button class="hs-clear" id="clearHist">全部清除</button>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-empty">尚無紀錄</div>
    </div>
  </div>

  <div style="height:20px"></div>
</div>

<script>
(function () {
  /* ── THEME ── */
  const html = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  let darkMode = !window.matchMedia('(prefers-color-scheme:light)').matches;
  function applyTheme() {
    if (darkMode) {
      html.style.setProperty('--ink', '#0a0a0f');
      html.style.setProperty('--ink2', '#1c1c28');
      html.style.setProperty('--ink3', '#2e2e42');
      html.style.setProperty('--glass', 'rgba(255,255,255,0.04)');
      themeBtn.textContent = '☀';
    } else {
      html.style.setProperty('--ink', '#f2f4f8');
      html.style.setProperty('--ink2', '#ffffff');
      html.style.setProperty('--ink3', '#e0e4ee');
      html.style.setProperty('--glass', 'rgba(0,0,0,0.04)');
      html.style.setProperty('--line', 'rgba(0,0,0,0.07)');
      themeBtn.textContent = '🌙';
    }
  }
  applyTheme();
  themeBtn.onclick = () => { darkMode = !darkMode; applyTheme(); };

  /* ── COLOUR PALETTE ── */
  const PALETTE = [
    '#c6ff00','#00e5ff','#ff4f6e','#a855f7',
    '#ffb300','#00e676','#ff6d00','#40c4ff',
  ];
  const classColor = {};
  let colorCursor = 0;
  function colorFor(cls) {
    if (!classColor[cls]) classColor[cls] = PALETTE[colorCursor++ % PALETTE.length];
    return classColor[cls];
  }
  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ── STATE ── */
  let model = null, camStream = null;
  let frozen = false, rafId = null;
  let confThresh = 0.40;
  let allRaw = [];          // all model predictions (unfiltered)
  let targetClass = null;   // class name the user clicked on
  let frozenPixels = null;  // ImageData for frozen bg
  let lastFrozenThumb = '';
  const history = [];

  /* ── DOM ── */
  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const ctx        = canvas.getContext('2d');
  const loadOv     = document.getElementById('load-ov');
  const loadTxt    = document.getElementById('loadTxt');
  const scanline   = document.getElementById('scanline');
  const flash      = document.getElementById('flash');
  const bigNum     = document.getElementById('bigNum');
  const countLabel = document.getElementById('countLabel');
  const modeDot    = document.getElementById('modeDot');
  const modeLabel  = document.getElementById('modeLabel');
  const tapHint    = document.getElementById('tap-hint');
  const targetBadge= document.getElementById('target-badge');
  const tbLabel    = document.getElementById('tb-label');
  const stTarget   = document.getElementById('stTarget');
  const stAll      = document.getElementById('stAll');
  const stConf     = document.getElementById('stConf');
  const resultCard = document.getElementById('resultCard');
  const rcTitle    = document.getElementById('rcTitle');
  const rcBadge    = document.getElementById('rcBadge');
  const rcBody     = document.getElementById('rcBody');
  const histList   = document.getElementById('histList');
  const vpWrap     = document.getElementById('vpWrap');

  /* ── SLIDER ── */
  const confSlider = document.getElementById('confSlider');
  const confValEl  = document.getElementById('confVal');
  function updateSlider(el) {
    const v = +el.value;
    confThresh = v / 100;
    confValEl.textContent = v + '%';
    const pct = ((v - 10) / 80 * 100).toFixed(1) + '%';
    el.style.setProperty('--pct', pct);
    if (allRaw.length) redraw();
  }
  confSlider.addEventListener('input', function(){ updateSlider(this); });
  updateSlider(confSlider);

  /* ── ROUND-RECT HELPER ── */
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }

  /* ── DRAW ── */
  function getFiltered() {
    const pass = allRaw.filter(p => p.score > confThresh);
    if (!targetClass) return pass;
    return pass.filter(p => p.class === targetClass);
  }

  function drawOverlay(preds) {
    preds.forEach((pred, i) => {
      const [x, y, w, h] = pred.bbox;
      const col = colorFor(pred.class);
      const pct = Math.round(pred.score * 100);
      const isTarget = pred.class === targetClass;

      // Box glow
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = isTarget ? 18 : 8;
      ctx.strokeStyle = col;
      ctx.lineWidth = isTarget ? 3 : 1.5;
      ctx.strokeRect(x, y, w, h);
      ctx.restore();

      if (isTarget) {
        // Fill overlay for target
        ctx.fillStyle = hexAlpha(col, 0.08);
        ctx.fillRect(x, y, w, h);
        // Corner ticks
        const tk = 12;
        ctx.strokeStyle = col; ctx.lineWidth = 3;
        [[x,y,x+tk,y],[x+w-tk,y,x+w,y],[x,y+h-tk,x,y+h],[x+w,y+h-tk,x+w,y+h]].forEach(([x1,y1,x2,y2])=>{
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        });
      }

      // Label
      ctx.font = `bold ${isTarget?13:11}px Space Mono, monospace`;
      const lbl = isTarget ? `◆ ${pred.class.toUpperCase()}  ${pct}%` : `${pred.class}  ${pct}%`;
      const tw = ctx.measureText(lbl).width;
      const lh = isTarget ? 22 : 18;
      ctx.fillStyle = isTarget ? hexAlpha(col, 0.92) : 'rgba(0,0,0,0.65)';
      rr(x, y - lh - 4, tw + 14, lh + 4, 4);
      ctx.fill();
      ctx.fillStyle = isTarget ? '#000' : col;
      ctx.shadowBlur = 0;
      ctx.fillText(lbl, x + 7, y - 6);

      // Number badge (target only)
      if (isTarget) {
        ctx.save();
        ctx.fillStyle = col;
        ctx.shadowColor = col; ctx.shadowBlur = 10;
        ctx.font = 'bold 14px Space Mono, monospace';
        ctx.fillText(`#${i+1}`, x+6, y+18);
        ctx.restore();
      }
    });
  }

  function drawLive(preds) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    drawOverlay(preds);
  }

  function redraw() {
    const preds = getFiltered();
    if (frozen) {
      if (frozenPixels) ctx.putImageData(frozenPixels, 0, 0);
      // Re-draw all preds (for context) then highlight target
      const allPass = allRaw.filter(p => p.score > confThresh);
      drawOverlay(allPass);
    }
    updateUI(preds, allRaw.filter(p => p.score > confThresh));
  }

  /* ── UPDATE UI ── */
  function updateUI(targetPreds, allPreds) {
    const n = targetPreds.length;
    const total = allPreds.length;

    // big number
    bigNum.textContent = n;
    bigNum.classList.toggle('has-target', !!targetClass);

    if (targetClass) {
      countLabel.textContent = `× ${targetClass}`;
    } else {
      countLabel.textContent = `件物件`;
    }

    stTarget.textContent = n;
    stAll.textContent = total;
    if (allPreds.length) {
      const best = allPreds.reduce((a,b) => a.score > b.score ? a : b);
      stConf.textContent = Math.round(best.score * 100) + '%';
    } else {
      stConf.textContent = '—';
    }

    // result card
    if (allPreds.length > 0) {
      // Group by class
      const groups = {};
      allPreds.forEach(p => { groups[p.class] = (groups[p.class]||0)+1; });
      const sorted = Object.entries(groups).sort((a,b)=>b[1]-a[1]);
      const maxN = sorted[0][1];

      rcTitle.textContent = targetClass ? `目標：${targetClass}` : '— 物件分類';
      rcBadge.textContent = n + ' 件';
      rcBody.innerHTML = sorted.map(([cls, cnt]) => {
        const col = colorFor(cls);
        const barW = Math.round(cnt / maxN * 100);
        const isT = cls === targetClass;
        return `<div class="rc-class-row" style="${isT?'opacity:1':'opacity:0.55'}">
          <div class="rc-dot" style="background:${col}"></div>
          <div class="rc-class-name" style="color:${isT?col:'inherit'}">${cls}</div>
          <div class="rc-bar-wrap"><div class="rc-bar" style="width:${barW}%;background:${col}"></div></div>
          <div class="rc-class-n">${cnt}</div>
        </div>`;
      }).join('');
      resultCard.classList.add('show');
    } else {
      resultCard.classList.remove('show');
    }
  }

  /* ── DETECTION LOOP ── */
  let lastTs = 0;
  async function detectFrame() {
    if (!model || frozen || video.readyState !== 4 || !video.videoWidth) return;
    try {
      const raw = await model.detect(video);
      if (frozen) return;
      allRaw = raw;
      const filtered = getFiltered();
      drawLive(frozen ? allRaw.filter(p=>p.score>confThresh) : filtered);
      if (!targetClass) drawOverlay(allRaw.filter(p=>p.score>confThresh));
      updateUI(filtered, allRaw.filter(p=>p.score>confThresh));
    } catch(e) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    }
  }

  function loop(ts) {
    if (!frozen) {
      if (model && video.readyState === 4 && video.videoWidth) {
        if (canvas.width !== video.videoWidth) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        if (ts - lastTs > 200) {
          lastTs = ts;
          detectFrame();
        } else {
          const preds = getFiltered();
          drawLive(preds);
          if (!targetClass) drawOverlay(allRaw.filter(p=>p.score>confThresh));
        }
      }
    }
    rafId = requestAnimationFrame(loop);
  }

  /* ── TAP TO SELECT TARGET ── */
  canvas.addEventListener('click', e => {
    if (!allRaw.length) return;
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top)  * (canvas.height / rect.height);

    // Ripple effect
    const rip = document.createElement('div');
    rip.className = 'tap-ripple';
    rip.style.left = e.clientX - rect.left + 'px';
    rip.style.top  = e.clientY - rect.top + 'px';
    vpWrap.appendChild(rip);
    setTimeout(() => rip.remove(), 600);

    const pass = allRaw.filter(p => p.score > confThresh);
    let hit = null;
    // Iterate in reverse so topmost drawn item is hit first
    for (let i = pass.length - 1; i >= 0; i--) {
      const [x,y,w,h] = pass[i].bbox;
      if (cx >= x && cx <= x+w && cy >= y && cy <= y+h) { hit = pass[i]; break; }
    }

    if (hit) {
      if (targetClass === hit.class) {
        // Toggle off
        setTarget(null);
      } else {
        setTarget(hit.class);
      }
    } else {
      // Tapped empty space → clear
      setTarget(null);
    }
  });

  function setTarget(cls) {
    targetClass = cls;
    tapHint.classList.toggle('hidden', true); // hide forever after first tap
    if (cls) {
      tbLabel.textContent = cls;
      targetBadge.classList.add('show');
    } else {
      targetBadge.classList.remove('show');
    }
    redraw();
  }

  /* ── FREEZE / LIVE ── */
  document.getElementById('btnFreeze').onclick = () => {
    if (frozen || !model || video.readyState !== 4) return;
    flash.classList.add('on');
    setTimeout(()=> flash.classList.remove('on'), 150);

    frozen = true;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    frozenPixels = ctx.getImageData(0, 0, canvas.width, canvas.height);

    scanline.classList.remove('on');
    modeDot.className = 'mode-dot frozen';
    modeLabel.textContent = 'FROZEN';

    model.detect(video).then(raw => {
      allRaw = raw;
      const allPass = raw.filter(p=>p.score>confThresh);
      ctx.putImageData(frozenPixels, 0, 0);
      drawOverlay(allPass);
      const filtered = getFiltered();
      updateUI(filtered, allPass);
      lastFrozenThumb = canvas.toDataURL('image/jpeg', 0.6);
    }).catch(()=>{ lastFrozenThumb = canvas.toDataURL('image/jpeg',0.6); });
  };

  document.getElementById('btnLive').onclick = () => {
    frozen = false;
    frozenPixels = null;
    allRaw = [];
    scanline.classList.add('on');
    modeDot.className = 'mode-dot live';
    modeLabel.textContent = 'LIVE';
  };

  document.getElementById('btnClear').onclick = () => {
    setTarget(null);
    tapHint.classList.remove('hidden');
  };

  /* ── SAVE HISTORY ── */
  document.getElementById('btnSave').onclick = () => {
    const thumb = lastFrozenThumb || canvas.toDataURL('image/jpeg', 0.5);
    const t = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const filtered = getFiltered();
    history.unshift({ thumb, count: filtered.length, target: targetClass || '全部', time: t });
    if (history.length > 10) history.pop();
    lastFrozenThumb = '';
    renderHistory();
  };

  document.getElementById('clearHist').onclick = () => { history.length = 0; renderHistory(); };

  function renderHistory() {
    if (!history.length) {
      histList.innerHTML = '<div class="hist-empty">尚無紀錄</div>';
      return;
    }
    histList.innerHTML = history.map((h, i) => `
      <div class="hist-item">
        <img class="hist-thumb" src="${h.thumb}" alt="">
        <div class="hist-info">
          <div class="hi-target">${h.target}</div>
          <div class="hi-meta">${h.time}</div>
        </div>
        <div class="hi-n">${h.count}</div>
        <button class="hist-del" data-i="${i}">✕</button>
      </div>`).join('');
    histList.querySelectorAll('.hist-del').forEach(b => {
      b.addEventListener('click', function() {
        history.splice(+this.dataset.i, 1);
        renderHistory();
      });
    });
  }

  /* ── FLIP CAMERA ── */
  let facingMode = 'environment';
  document.getElementById('flipBtn').onclick = async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    frozen = false; frozenPixels = null; allRaw = [];
    modeDot.className = 'mode-dot live'; modeLabel.textContent = 'LIVE';
    scanline.classList.add('on');
    try { await startCamera(); } catch(e) { alert('無法切換鏡頭'); }
  };

  /* ── CAMERA ── */
  async function startCamera() {
    if (camStream) camStream.getTracks().forEach(t=>t.stop());
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: {ideal: facingMode}, width:{ideal:1280}, height:{ideal:960} },
      audio: false
    });
    video.srcObject = camStream;
    return new Promise(res => {
      video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        res();
      };
    });
  }

  /* ── INIT ── */
  async function init() {
    try {
      loadTxt.innerHTML = '載入 AI 模型中<br>首次約 15MB';
      model = await cocoSsd.load({ base: 'mobilenet_v2' });
      loadTxt.innerHTML = '開啟相機中…';
      await startCamera();
      loadOv.classList.add('gone');
      scanline.classList.add('on');
      rafId = requestAnimationFrame(loop);
    } catch(e) {
      document.querySelector('.load-ring').style.display = 'none';
      loadTxt.innerHTML = '❌ 錯誤<br><small style="font-size:10px;opacity:.6;text-transform:none;letter-spacing:0">' +
        (e.message || '請確認相機權限後重整') + '</small>';
    }
  }

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', init)
    : init();

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { cancelAnimationFrame(rafId); rafId = null; }
    else if (model && !rafId && !frozen) rafId = requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
