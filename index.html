<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>零件相機計數 · 點選同類</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg:        #f0f4ff;
  --bg2:       #ffffff;
  --surface:   rgba(255,255,255,0.92);
  --border:    rgba(0,0,0,0.07);
  --text:      #1a1a2e;
  --text2:     #44475a;
  --text3:     #9b9bb4;
  --shadow:    0 8px 32px rgba(80,80,180,0.13);
  --shadow-sm: 0 2px 12px rgba(80,80,180,0.09);
  --radius:    22px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --trans:     0.32s cubic-bezier(.4,0,.2,1);
  --c1: #ff6b6b; --c1l: rgba(255,107,107,0.13);
  --c2: #ffd93d; --c2l: rgba(255,217,61,0.13);
  --c3: #6bcb77; --c3l: rgba(107,203,119,0.13);
  --c4: #4d96ff; --c4l: rgba(77,150,255,0.13);
  --c5: #c77dff; --c5l: rgba(199,125,255,0.13);
  --c6: #ff9f1c; --c6l: rgba(255,159,28,0.13);
}
[data-theme="dark"] {
  --bg:        #0f0f1a;
  --bg2:       #1a1a2e;
  --surface:   rgba(26,26,46,0.95);
  --border:    rgba(255,255,255,0.08);
  --text:      #f0f0ff;
  --text2:     #c0c0d8;
  --text3:     #5a5a7a;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
  --c1l: rgba(255,107,107,0.18);
  --c4l: rgba(77,150,255,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Nunito',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background var(--trans),color var(--trans);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.app{max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,24px)}

/* Header */
.header{
  position:sticky;top:0;z-index:200;
  padding:env(safe-area-inset-top,48px) 18px 0;
  background:var(--bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  transition:background var(--trans);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0 13px;border-bottom:1.5px solid var(--border);
}
.header-left{display:flex;flex-direction:column;gap:1px}
.app-title{
  font-size:26px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#4d96ff,#c77dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.app-sub{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase}
.header-btns{display:flex;gap:9px;align-items:center}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:var(--surface);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:var(--shadow-sm);
  transition:transform 0.2s,background var(--trans);-webkit-tap-highlight-color:transparent;
}
.icon-btn:active{transform:scale(0.87)}

.body{padding:18px 15px;display:flex;flex-direction:column;gap:16px}

/* Card */
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:background var(--trans),box-shadow var(--trans);
}

/* Camera Viewport */
.camera-card{position:relative;background:#000;border:none}
.viewport{position:relative;width:100%;padding-bottom:75%;background:#000;overflow:hidden}
video,#det-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;object-fit:cover;display:block;
}
video{opacity:0}

.bracket{position:absolute;width:26px;height:26px;z-index:5;pointer-events:none}
.bracket.tl{top:14px;left:14px;border-top:3px solid #4d96ff;border-left:3px solid #4d96ff;border-radius:4px 0 0 0}
.bracket.tr{top:14px;right:14px;border-top:3px solid #4d96ff;border-right:3px solid #4d96ff;border-radius:0 4px 0 0}
.bracket.bl{bottom:14px;left:14px;border-bottom:3px solid #4d96ff;border-left:3px solid #4d96ff;border-radius:0 0 0 4px}
.bracket.br{bottom:14px;right:14px;border-bottom:3px solid #4d96ff;border-right:3px solid #4d96ff;border-radius:0 0 4px 0}

#scan-bar{
  position:absolute;left:0;right:0;height:3px;z-index:4;pointer-events:none;
  background:linear-gradient(90deg,transparent,#c77dff 40%,#4d96ff 60%,transparent);
  box-shadow:0 0 12px rgba(77,150,255,0.7);
  animation:scan 2.4s linear infinite;opacity:0;transition:opacity 0.4s;
}
#scan-bar.on{opacity:1}
@keyframes scan{0%{top:0%}100%{top:100%}}

#freeze-flash{
  position:absolute;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:10;transition:opacity 0.08s;
}
#freeze-flash.flash{opacity:0.75}

#loading-ov{
  position:absolute;inset:0;background:rgba(15,15,26,0.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;gap:14px;transition:opacity 0.5s;
}
#loading-ov.gone{opacity:0;pointer-events:none}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);border-top-color:#4d96ff;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{
  font-size:13px;font-weight:800;color:rgba(255,255,255,0.6);
  letter-spacing:1.5px;text-transform:uppercase;text-align:center;line-height:1.8;
}

#mode-badge{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  z-index:6;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:4px 14px;border-radius:20px;white-space:nowrap;
  background:rgba(0,0,0,0.55);color:#fff;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;transition:background 0.3s;
}
#mode-badge.frozen{background:rgba(199,125,255,0.75)}

#big-count{
  position:absolute;bottom:18px;left:18px;z-index:6;pointer-events:none;
  display:flex;align-items:flex-end;gap:5px;
}
.big-num{
  font-size:58px;font-weight:900;line-height:1;letter-spacing:-2px;color:#fff;
  text-shadow:0 2px 16px rgba(0,0,0,0.6),0 0 40px rgba(77,150,255,0.5);
}
.big-num.pop{animation:pop .22s cubic-bezier(.36,.07,.19,.97)}
@keyframes pop{0%{transform:scale(1.22)}60%{transform:scale(0.95)}100%{transform:scale(1)}}
.big-unit{font-size:16px;font-weight:800;color:rgba(255,255,255,0.7);margin-bottom:10px}

/* Controls */
.cam-controls{
  display:flex;align-items:center;justify-content:space-around;
  padding:18px 10px 20px;gap:10px;
}
.cam-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:none;background:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform 0.15s;
}
.cam-btn:active{transform:scale(0.88)}
.cam-btn-circle{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:var(--shadow-sm);border:2px solid var(--border);
  background:var(--bg2);transition:background var(--trans);
}
.cam-btn-circle.accent {background:linear-gradient(135deg,#4d96ff,#c77dff);border:none;box-shadow:0 4px 20px rgba(77,150,255,0.4)}
.cam-btn-circle.accent2{background:linear-gradient(135deg,#ff6b6b,#ffd93d);border:none;box-shadow:0 4px 20px rgba(255,107,107,0.35)}
.cam-btn-circle.accent3{background:linear-gradient(135deg,#6bcb77,#4d96ff);border:none;box-shadow:0 4px 20px rgba(107,203,119,0.35)}
.cam-btn-label{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:0.3px}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 15px 15px}
.stat-pill{
  border-radius:var(--radius-sm);padding:13px 12px;
  display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;
}
.stat-pill::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.12);
}
.s-label{font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;opacity:0.75;color:#fff}
.s-val  {font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1.1}
.s-unit {font-size:11px;font-weight:700;color:rgba(255,255,255,0.65)}

/* Type filter */
.type-section{padding:4px 15px 16px;display:flex;flex-direction:column;gap:10px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.type-btn{
  border:2px solid var(--border);background:var(--bg);
  border-radius:var(--radius-xs);padding:10px 4px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;
  font-family:inherit;transition:all 0.18s;-webkit-tap-highlight-color:transparent;
}
.type-btn:active{transform:scale(0.93)}
.type-btn.sel{border-color:transparent;box-shadow:0 4px 16px rgba(77,150,255,0.25)}
.type-emoji{font-size:22px;line-height:1}
.type-name {font-size:11px;font-weight:800;color:var(--text2);letter-spacing:0.2px}
.type-btn.sel .type-name{color:#fff}

/* Detection list */
.det-header{display:flex;align-items:center;justify-content:space-between;padding:14px 15px 8px}
.det-title{font-size:14px;font-weight:900;color:var(--text)}
.det-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:var(--c4l);color:var(--c4)}
.det-list{display:flex;flex-wrap:wrap;gap:7px;padding:2px 15px 16px;min-height:46px}
.det-chip{
  display:flex;align-items:center;gap:6px;border-radius:20px;padding:6px 13px;
  font-size:13px;font-weight:800;animation:chip-in .18s ease;
}
@keyframes chip-in{from{opacity:0;transform:scale(0.82)}to{opacity:1;transform:scale(1)}}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.det-empty{font-size:13px;font-weight:700;color:var(--text3);padding:6px 0;width:100%;text-align:center}

/* History */
.history-wrap{padding:0 15px 16px;display:flex;flex-direction:column;gap:7px;max-height:230px;overflow-y:auto}
.hist-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border-radius:var(--radius-xs);
  padding:10px 13px;border:1.5px solid var(--border);animation:slide-in .22s ease;
}
@keyframes slide-in{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
.hist-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1.5px solid var(--border)}
.hist-info{flex:1;display:flex;flex-direction:column;gap:2px}
.hist-count{font-size:17px;font-weight:900;color:var(--c4)}
.hist-meta {font-size:11px;font-weight:700;color:var(--text3)}
.hist-del{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}
.hist-empty{text-align:center;font-size:13px;font-weight:700;color:var(--text3);padding:12px 0}

/* Confidence slider */
.conf-row{display:flex;align-items:center;gap:12px;padding:0 15px 16px}
.conf-label{font-size:12px;font-weight:800;color:var(--text3);white-space:nowrap}
input[type=range]{
  flex:1;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#4d96ff 0%,#4d96ff var(--pct,36%),rgba(128,128,128,0.2) var(--pct,36%));
  outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#4d96ff,#c77dff);
  border:3px solid #fff;box-shadow:0 2px 8px rgba(77,150,255,0.5);
}
.conf-val{font-size:13px;font-weight:900;color:var(--c4);min-width:36px;text-align:right}

/* Fade-up on load */
.body>*{animation:fade-up 0.4s ease backwards}
.body>*:nth-child(1){animation-delay:0s}
.body>*:nth-child(2){animation-delay:.07s}
.body>*:nth-child(3){animation-delay:.13s}
.body>*:nth-child(4){animation-delay:.19s}
@keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

<!-- TensorFlow and COCO-SSD -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="app-title">零件計數</div>
        <div class="app-sub">點選物件 · 同類計數</div>
      </div>
      <div class="header-btns">
        <button class="icon-btn" id="flipBtn" title="翻轉鏡頭">🔄</button>
        <button class="icon-btn" id="themeBtn">🌙</button>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- ① Camera -->
    <div class="card camera-card">
      <div class="viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="det-canvas"></canvas>
        <div class="bracket tl"></div><div class="bracket tr"></div>
        <div class="bracket bl"></div><div class="bracket br"></div>
        <div id="scan-bar"></div>
        <div id="mode-badge">🔴 LIVE</div>
        <div id="freeze-flash"></div>
        <div id="big-count">
          <div class="big-num" id="bigNum">0</div>
          <div class="big-unit">件</div>
        </div>
        <div id="loading-ov">
          <div class="spinner" id="loadSpinner"></div>
          <div class="loading-txt" id="load-txt">下載模型中<br>首次約 15MB</div>
        </div>
      </div>

      <!-- 統計卡片 -->
      <div class="stats-strip">
        <div class="stat-pill" style="background:linear-gradient(135deg,#4d96ff,#c77dff)">
          <div class="s-label">偵測數量</div>
          <div class="s-val" id="sCount">0</div>
          <div class="s-unit">件</div>
        </div>
        <div class="stat-pill" style="background:linear-gradient(135deg,#ff6b6b,#ffd93d)">
          <div class="s-label">最高信心</div>
          <div class="s-val" id="sConf">—</div>
          <div class="s-unit">%</div>
        </div>
        <div class="stat-pill" style="background:linear-gradient(135deg,#6bcb77,#4d96ff)">
          <div class="s-label">種類</div>
          <div class="s-val" id="sClass">—</div>
          <div class="s-unit">類</div>
        </div>
      </div>

      <!-- 按鈕列 -->
      <div class="cam-controls">
        <button class="cam-btn" id="btnFreeze">
          <div class="cam-btn-circle accent2" id="freezeCircle">📸</div>
          <div class="cam-btn-label" id="freezeLabel">拍照凍結</div>
        </button>
        <button class="cam-btn" id="btnLive">
          <div class="cam-btn-circle accent">▶</div>
          <div class="cam-btn-label">恢復直播</div>
        </button>
        <button class="cam-btn" id="btnSaveHist">
          <div class="cam-btn-circle accent3">💾</div>
          <div class="cam-btn-label">儲存紀錄</div>
        </button>
      </div>

      <!-- 信心滑桿 -->
      <div class="conf-row">
        <div class="conf-label">信心閾值</div>
        <input type="range" id="confSlider" min="20" max="90" value="45">
        <div class="conf-val" id="confVal">45%</div>
      </div>
    </div> <!-- end camera card -->

    <!-- ② Type filter -->
    <div class="card">
      <div class="det-header">
        <div class="det-title">🎯 偵測類別篩選</div>
        <div class="det-badge" id="filterBadge">全部</div>
      </div>
      <div class="type-section">
        <div class="type-grid" id="typeGrid"></div>
        <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;" id="exactFilterRow">
          <span style="font-size:12px; font-weight:700; color:var(--text3);">⚡點選物件</span>
          <span id="currentExactClass" style="font-size:12px; font-weight:800; background:var(--c4l); padding:4px 8px; border-radius:20px; color:var(--c4); display:none;"></span>
          <button id="clearExactFilter" style="background:none; border:none; font-size:14px; cursor:pointer; color:var(--text3); display:none;">✕ 清除</button>
        </div>
      </div>
    </div>

    <!-- ③ Detections -->
    <div class="card">
      <div class="det-header">
        <div class="det-title">📋 本次偵測結果</div>
        <div class="det-badge" id="detBadge">0 物件</div>
      </div>
      <div class="det-list" id="detList">
        <div class="det-empty">等待偵測中…</div>
      </div>
    </div>

    <!-- ④ History -->
    <div class="card">
      <div class="det-header">
        <div class="det-title">🗂 拍照紀錄</div>
        <button style="background:none;border:none;font-size:12px;font-weight:800;color:var(--c1);cursor:pointer"
                id="clearHistoryBtn">清除全部</button>
      </div>
      <div class="history-wrap" id="histWrap">
        <div class="hist-empty">尚無拍照紀錄</div>
      </div>
    </div>

  </div> <!-- body -->
</div> <!-- app -->

<script>
(function(){
  /* ----- THEME ----- */
  const htmlEl = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  function toggleTheme(){
    const d = htmlEl.getAttribute('data-theme')==='dark';
    htmlEl.setAttribute('data-theme', d?'light':'dark');
    themeBtn.textContent = d?'🌙':'☀️';
  }
  themeBtn.onclick = toggleTheme;
  if(window.matchMedia('(prefers-color-scheme:dark)').matches){
    htmlEl.setAttribute('data-theme','dark');
    themeBtn.textContent='☀️';
  }

  /* ----- CONSTANTS & HELPERS ----- */
  const TYPES = [
    {key:'all',    emoji:'🔍', name:'全部', grad:'linear-gradient(135deg,#4d96ff,#c77dff)'},
    {key:'person', emoji:'👤', name:'人物', grad:'linear-gradient(135deg,#ff6b6b,#c77dff)'},
    {key:'bottle', emoji:'🧴', name:'瓶罐', grad:'linear-gradient(135deg,#ff6b6b,#ffd93d)'},
    {key:'box',    emoji:'📦', name:'箱體', grad:'linear-gradient(135deg,#ff9f1c,#ff6b6b)'},
    {key:'book',   emoji:'📚', name:'書冊', grad:'linear-gradient(135deg,#6bcb77,#4d96ff)'},
    {key:'tool',   emoji:'🔧', name:'工具', grad:'linear-gradient(135deg,#c77dff,#4d96ff)'},
  ];
  
  const TOOL_CLASSES   = new Set(['scissors','knife','fork','spoon','toothbrush','cell phone',
                                 'remote','keyboard','mouse','laptop','clock','vase','cup','bowl']);
  const BOX_CLASSES    = new Set(['suitcase','handbag','backpack','tv','microwave','oven',
                                 'refrigerator','sink','toilet','chair','couch','bed']);
  const BOTTLE_CLASSES = new Set(['bottle','wine glass']);

  function typeOf(cls){
    if(cls==='person')           return 'person';
    if(BOTTLE_CLASSES.has(cls))  return 'bottle';
    if(BOX_CLASSES.has(cls))     return 'box';
    if(cls==='book')             return 'book';
    if(TOOL_CLASSES.has(cls))    return 'tool';
    return 'all';
  }

  // 篩選狀態
  let selectedType = 'all';           // 大類按鈕選擇
  let exactFilterClass = null;        // 精確類名篩選 (點選物件後設定)

  const filterBadge = document.getElementById('filterBadge');
  const typeGrid = document.getElementById('typeGrid');
  const currentExactSpan = document.getElementById('currentExactClass');
  const clearExactBtn = document.getElementById('clearExactFilter');
  
  // 建立類別按鈕
  TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (t.key === 'all' ? ' sel' : '');
    btn.dataset.key = t.key;
    btn.innerHTML = `<span class="type-emoji">${t.emoji}</span><span class="type-name">${t.name}</span>`;
    if(t.key === 'all') btn.style.background = t.grad;
    
    btn.onclick = () => {
      // 點擊大類按鈕時，清除精確篩選，切換到大類
      setExactFilter(null);
      selectedType = t.key;
      document.querySelectorAll('.type-btn').forEach(b => { 
        b.classList.remove('sel'); 
        b.style.background = ''; 
      });
      btn.classList.add('sel');
      btn.style.background = t.grad;
      filterBadge.textContent = t.key === 'all' ? '全部' : t.name;
      
      // 重新過濾當前顯示
      applyFilterToLastPreds();
    };
    typeGrid.appendChild(btn);
  });

  // 設定精確篩選類別
  function setExactFilter(className) {
    exactFilterClass = className;
    if (className) {
      currentExactSpan.textContent = className;
      currentExactSpan.style.display = 'inline-block';
      clearExactBtn.style.display = 'inline-block';
      filterBadge.textContent = `精確: ${className}`;
      // 取消所有大類按鈕的選中樣式 (可選)
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('sel'));
    } else {
      currentExactSpan.style.display = 'none';
      clearExactBtn.style.display = 'none';
      // 恢復大類按鈕選中 (根據 selectedType)
      document.querySelectorAll('.type-btn').forEach(b => {
        if (b.dataset.key === selectedType) {
          b.classList.add('sel');
          b.style.background = TYPES.find(t => t.key === selectedType)?.grad || '';
        } else {
          b.classList.remove('sel');
          b.style.background = '';
        }
      });
      filterBadge.textContent = selectedType === 'all' ? '全部' : TYPES.find(t => t.key === selectedType)?.name || '全部';
    }
  }

  // 清除精確篩選按鈕
  clearExactBtn.onclick = () => {
    setExactFilter(null);
    applyFilterToLastPreds();
  };

  // 過濾 preds 陣列 (根據信心、精確類、大類)
  function filterPredictions(preds) {
    let filtered = preds.filter(p => p.score > confThresh);
    if (exactFilterClass) {
      filtered = filtered.filter(p => p.class === exactFilterClass);
    } else if (selectedType !== 'all') {
      filtered = filtered.filter(p => typeOf(p.class) === selectedType);
    }
    return filtered;
  }

  // 應用當前篩選到 lastPreds 並更新畫面
  function applyFilterToLastPreds() {
    if (!allPreds) return;
    const filtered = filterPredictions(allPreds);
    lastPreds = filtered;
    if (!frozen) {
      drawFrame(filtered, false);
    } else {
      // 如果處於凍結模式，應該在凍結的畫面上重繪篩選後的框
      // 但凍結時 lastPreds 可能來自凍結時的檢測，我們需要保留背景圖
      // 這裡簡單重繪（背景已經存在）
      drawFrame(filtered, true);
    }
    updateStats(filtered);
  }

  // 顏色配置
  const CHIP_COLORS = [
    {bg:'rgba(77,150,255,0.13)',  color:'#4d96ff'},
    {bg:'rgba(199,125,255,0.13)', color:'#c77dff'},
    {bg:'rgba(107,203,119,0.13)', color:'#6bcb77'},
    {bg:'rgba(255,107,107,0.13)', color:'#ff6b6b'},
    {bg:'rgba(255,217,61,0.13)',  color:'#b38600'},
    {bg:'rgba(255,159,28,0.13)',  color:'#ff9f1c'},
  ];
  const classColorMap = {};
  let colorIdx = 0;
  function colorFor(cls){
    if(!classColorMap[cls]){ 
      classColorMap[cls] = CHIP_COLORS[colorIdx++ % CHIP_COLORS.length]; 
    }
    return classColorMap[cls];
  }

  /* ----- CORE STATE ----- */
  let model = null;
  let camStream = null;
  let frozen = false;
  let rafId = null;
  let confThresh = 0.45;
  let allPreds = [];            // 所有經過信心門檻的原始預測 (未經大類/精確篩選)
  let lastPreds = [];           // 經過篩選後用於顯示的預測
  let lastDetectTs = 0;
  const snapHistory = [];
  let lastFrozenThumb = '';

  // DOM 元素
  const video       = document.getElementById('video');
  const canvas      = document.getElementById('det-canvas');
  const ctx         = canvas.getContext('2d');
  const loadOv      = document.getElementById('loading-ov');
  const loadTxt     = document.getElementById('load-txt');
  const loadSpinner = document.getElementById('loadSpinner');
  const scanBar     = document.getElementById('scan-bar');
  const modeBadge   = document.getElementById('mode-badge');
  const bigNum      = document.getElementById('bigNum');
  const sCount      = document.getElementById('sCount');
  const sConf       = document.getElementById('sConf');
  const sClass      = document.getElementById('sClass');
  const detList     = document.getElementById('detList');
  const detBadge    = document.getElementById('detBadge');
  const histWrap    = document.getElementById('histWrap');
  const freezeFlash = document.getElementById('freeze-flash');
  const freezeCircle= document.getElementById('freezeCircle');
  const freezeLabel = document.getElementById('freezeLabel');

  /* ----- SLIDER ----- */
  const confSlider = document.getElementById('confSlider');
  const confVal    = document.getElementById('confVal');
  
  function updateConf(el){
    const v = parseInt(el.value);
    confThresh = v/100;
    confVal.textContent = v+'%';
    const pct = ((v-20)/(90-20)*100).toFixed(1)+'%';
    el.style.setProperty('--pct', pct);
    // 信心改變，重新過濾
    if (allPreds.length) {
      applyFilterToLastPreds();
    }
  }
  
  confSlider.addEventListener('input', function() {
    updateConf(this);
  });
  updateConf(confSlider);

  /* ----- MODEL LOAD ----- */
  async function loadModel(){
    loadTxt.innerHTML = '下載模型中<br>首次約 15MB';
    try {
      model = await cocoSsd.load({base:'mobilenet_v2'});
    } catch (e) {
      console.error('模型載入失敗:', e);
      throw e;
    }
  }

  /* ----- CAMERA ----- */
  let facingMode = 'environment';
  async function startCamera(){
    if(camStream) {
      camStream.getTracks().forEach(t => t.stop());
    }
    
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: facingMode },
          width: { ideal: 1280 },
          height: { ideal: 960 }
        },
        audio: false
      });
      
      video.srcObject = camStream;
      
      return new Promise((resolve) => {
        video.onloadedmetadata = () => { 
          canvas.width = video.videoWidth; 
          canvas.height = video.videoHeight; 
          resolve(); 
        };
      });
    } catch (e) {
      console.error('相機啟動失敗:', e);
      throw e;
    }
  }
  
  document.getElementById('flipBtn').onclick = async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    frozen = false;
    setLiveMode();
    try {
      await startCamera();
    } catch (e) {
      showError('無法切換鏡頭，請確認相機權限');
    }
  };

  /* ----- DRAW UTILS ----- */
  function hexToRgba(hex, alpha){
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  
  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawFrame(preds, isFrozen){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(!isFrozen) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    }
    
    preds.forEach((pred, i) => {
      const [x, y, w, h] = pred.bbox;
      const c = colorFor(pred.class);
      const pct = Math.round(pred.score * 100);
      
      // 發光邊框
      ctx.save();
      ctx.shadowColor = c.color;
      ctx.shadowBlur = 10;
      ctx.strokeStyle = c.color;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, y, w, h);
      ctx.restore();
      
      // 角落標記
      const tk = 14;
      ctx.strokeStyle = c.color;
      ctx.lineWidth = 3;
      const corners = [
        [x, y, x+tk, y],
        [x+w-tk, y, x+w, y],
        [x, y+h-tk, x, y+h],
        [x+w, y+h-tk, x+w, y+h]
      ];
      corners.forEach(([x1, y1, x2, y2]) => {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      });
      
      // 標籤背景
      ctx.font = 'bold 13px Nunito, sans-serif';
      const label = `${pred.class.toUpperCase()}  ${pct}%`;
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = hexToRgba(c.color, 0.8);
      roundRect(ctx, x, y-28, tw+14, 26, 5);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      ctx.fillText(label, x+7, y-10);
      
      // 編號
      ctx.save();
      ctx.font = 'bold 15px Nunito, sans-serif';
      ctx.fillStyle = c.color;
      ctx.shadowColor = c.color;
      ctx.shadowBlur = 8;
      ctx.fillText(`#${i+1}`, x+6, y+20);
      ctx.restore();
    });
  }

  /* ----- DETECTION LOOP ----- */
  async function detectFrame() {
    if (!model || frozen || video.readyState !== 4 || !video.videoWidth) {
      return;
    }
    
    try {
      const raw = await model.detect(video);
      if (frozen) return;
      
      // 先按信心門檻過濾，得到所有預測
      const thresholdPreds = raw.filter(p => p.score > confThresh);
      allPreds = thresholdPreds;
      
      // 再根據篩選條件過濾用於顯示的預測
      const filtered = filterPredictions(thresholdPreds);
      lastPreds = filtered;
      
      drawFrame(filtered, false);
      updateStats(filtered);
    } catch (e) {
      console.warn('偵測錯誤:', e);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    }
  }

  function loop(ts) {
    if (frozen) {
      rafId = requestAnimationFrame(loop);
      return;
    }
    
    if (model && video.readyState === 4 && video.videoWidth) {
      if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      
      if (ts - lastDetectTs > 220) {
        lastDetectTs = ts;
        detectFrame();
      } else {
        drawFrame(lastPreds, false);
      }
    }
    
    rafId = requestAnimationFrame(loop);
  }

  /* ----- STATS & UI UPDATE ----- */
  function updateStats(preds){
    const n = preds.length;
    sCount.textContent = n;
    bigNum.textContent = n;
    bigNum.classList.remove('pop');
    void bigNum.offsetWidth;
    bigNum.classList.add('pop');
    
    if (n > 0) {
      const top = preds.reduce((a, b) => a.score > b.score ? a : b);
      sConf.textContent = Math.round(top.score * 100);
      sClass.textContent = [...new Set(preds.map(p => p.class))].length;
    } else {
      sConf.textContent = '—';
      sClass.textContent = '—';
    }
    
    detBadge.textContent = n + ' 物件';
    
    if (n === 0) {
      detList.innerHTML = '<div class="det-empty">無偵測結果</div>';
    } else {
      detList.innerHTML = [...preds]
        .sort((a, b) => b.score - a.score)
        .map((p, i) => {
          const c = colorFor(p.class);
          const pct = Math.round(p.score * 100);
          return `<div class="det-chip" style="background:${c.bg};color:${c.color}">
            <span class="chip-dot" style="background:${c.color}"></span>
            #${i+1} ${p.class} <span style="opacity:.6">${pct}%</span></div>`;
        }).join('');
    }
  }

  /* ----- FREEZE / LIVE ----- */
  function setLiveMode(){
    frozen = false;
    scanBar.classList.add('on');
    modeBadge.textContent = '🔴 LIVE';
    modeBadge.classList.remove('frozen');
    freezeLabel.textContent = '拍照凍結';
    freezeCircle.textContent = '📸';
  }

  document.getElementById('btnFreeze').onclick = () => {
    if (!frozen && model && video.readyState === 4) {
      frozen = true;
      
      freezeFlash.classList.add('flash');
      setTimeout(() => freezeFlash.classList.remove('flash'), 180);
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      scanBar.classList.remove('on');
      modeBadge.textContent = '❄️ 已凍結';
      modeBadge.classList.add('frozen');
      freezeLabel.textContent = '已凍結';
      freezeCircle.textContent = '❄️';
      
      model.detect(video).then(raw => {
        const thresholdPreds = raw.filter(p => p.score > confThresh);
        allPreds = thresholdPreds;
        const filtered = filterPredictions(thresholdPreds);
        lastPreds = filtered;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        drawFrame(filtered, true);
        updateStats(filtered);
        
        lastFrozenThumb = canvas.toDataURL('image/jpeg', 0.6);
      }).catch(() => { 
        lastFrozenThumb = canvas.toDataURL('image/jpeg', 0.6); 
      });
    }
  };

  document.getElementById('btnLive').onclick = () => setLiveMode();

  /* ----- 點選物件篩選 (canvas 點擊事件) ----- */
  canvas.addEventListener('click', (e) => {
    if (!allPreds.length) return; // 沒有預測資料
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;
    
    // 遍歷所有原始預測 (allPreds) 找出被點擊的物件
    let hit = null;
    for (let pred of allPreds) {
      const [x, y, w, h] = pred.bbox;
      if (clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h) {
        hit = pred;
        break;
      }
    }
    
    if (hit) {
      // 如果點擊的類別與目前精確篩選類別相同，則清除篩選；否則設為該類別
      if (exactFilterClass === hit.class) {
        setExactFilter(null);
      } else {
        setExactFilter(hit.class);
      }
      applyFilterToLastPreds();
    }
  });

  /* ----- HISTORY ----- */
  document.getElementById('btnSaveHist').onclick = () => {
    const thumb = lastFrozenThumb || canvas.toDataURL('image/jpeg', 0.55);
    const now = new Date();
    const t = now.toLocaleTimeString('zh-TW', {
      hour: '2-digit', 
      minute: '2-digit', 
      second: '2-digit'
    });
    
    snapHistory.unshift({
      thumb, 
      count: lastPreds.length, 
      time: t,
      classes: [...new Set(lastPreds.map(p => p.class))]
    });
    
    if (snapHistory.length > 12) snapHistory.pop();
    lastFrozenThumb = '';
    renderHistory();
  };

  document.getElementById('clearHistoryBtn').onclick = function() {
    snapHistory.length = 0;
    renderHistory();
  };

  function renderHistory(){
    if (snapHistory.length === 0) {
      histWrap.innerHTML = '<div class="hist-empty">尚無拍照紀錄</div>';
    } else {
      histWrap.innerHTML = snapHistory.map((h, i) => {
        const classStr = h.classes.length ? ' · ' + h.classes.slice(0, 3).join('、') : '';
        return `
        <div class="hist-item">
          <img class="hist-thumb" src="${h.thumb}" alt="snap">
          <div class="hist-info">
            <div class="hist-count">偵測 ${h.count} 件</div>
            <div class="hist-meta">${h.time}${classStr}</div>
          </div>
          <button class="hist-del" onclick="(function(idx){
            const snapshots = document.querySelectorAll('.hist-item');
            if(snapshots[idx]) snapshots[idx].remove();
            window.snapHistory.splice(idx, 1);
          })(${i})">✕</button>
        </div>`;
      }).join('');
    }
  }

  window.snapHistory = snapHistory;

  /* ----- ERROR HANDLING ----- */
  function showError(msg) {
    loadOv.classList.remove('gone');
    loadOv.style.cssText = 'opacity:1;pointer-events:auto';
    loadSpinner.style.display = 'none';
    loadTxt.innerHTML = '❌ 錯誤<br><span style="font-size:11px;opacity:.65;text-transform:none;letter-spacing:0">' + msg + '</span>';
  }

  /* ----- INIT ----- */
  async function init() {
    try {
      await loadModel();
      loadTxt.innerHTML = '開啟相機中…';
      await startCamera();
      loadOv.classList.add('gone');
      scanBar.classList.add('on');
      rafId = requestAnimationFrame(loop);
    } catch (e) {
      console.error('Init error:', e);
      showError(e && e.message ? e.message : '請確認相機權限後重新整理頁面');
    }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  /* ----- VISIBILITY ----- */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    } else {
      if (model && !rafId && !frozen) {
        rafId = requestAnimationFrame(loop);
      }
    }
  });
})();
</script>
</body>
</html>
