<!DOCTYPE html>
<html lang="zh-TW" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>智慧計數 · AI Vision</title>
<style>
/* ─────────────────────────────────────────
   SF Pro + Apple System Font Stack
──────────────────────────────────────────*/
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700;800;900&display=swap');

/* fallback to system SF Pro on Apple devices */
:root {
  --ff: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
}

/* ─────────────────────────────────────────
   DESIGN TOKENS — DARK
──────────────────────────────────────────*/
[data-scheme="dark"] {
  /* Backgrounds */
  --bg-primary:     #000000;
  --bg-secondary:   #1c1c1e;
  --bg-tertiary:    #2c2c2e;
  --bg-quaternary:  #3a3a3c;
  --bg-grouped:     #000000;

  /* Glass / Blur surfaces */
  --glass-1:        rgba(28,28,30,0.82);
  --glass-2:        rgba(44,44,46,0.75);
  --glass-3:        rgba(58,58,60,0.60);
  --glass-border:   rgba(255,255,255,0.10);
  --glass-border-2: rgba(255,255,255,0.06);

  /* Text */
  --text-primary:   #ffffff;
  --text-secondary: rgba(235,235,245,0.60);
  --text-tertiary:  rgba(235,235,245,0.30);
  --text-quaternary:rgba(235,235,245,0.18);

  /* Fills */
  --fill-1: rgba(120,120,128,0.36);
  --fill-2: rgba(120,120,128,0.32);
  --fill-3: rgba(118,118,128,0.24);
  --fill-4: rgba(116,116,128,0.18);

  /* Separator */
  --sep: rgba(84,84,88,0.65);

  /* Apple System Colors (vibrant dark variants) */
  --blue:   #0a84ff;
  --green:  #30d158;
  --indigo: #5e5ce6;
  --orange: #ff9f0a;
  --pink:   #ff375f;
  --purple: #bf5af2;
  --red:    #ff453a;
  --teal:   #40c8e0;
  --yellow: #ffd60a;
  --cyan:   #32ade6;
  --mint:   #63e6be;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.40);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.50);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.60);

  /* Gradient accent */
  --grad-blue:   linear-gradient(135deg, #0a84ff, #5e5ce6);
  --grad-green:  linear-gradient(135deg, #30d158, #40c8e0);
  --grad-orange: linear-gradient(135deg, #ff9f0a, #ff375f);
  --grad-purple: linear-gradient(135deg, #bf5af2, #5e5ce6);
}

/* ─────────────────────────────────────────
   DESIGN TOKENS — LIGHT
──────────────────────────────────────────*/
[data-scheme="light"] {
  --bg-primary:     #f2f2f7;
  --bg-secondary:   #ffffff;
  --bg-tertiary:    #f2f2f7;
  --bg-quaternary:  #e5e5ea;
  --bg-grouped:     #f2f2f7;

  --glass-1:        rgba(255,255,255,0.80);
  --glass-2:        rgba(242,242,247,0.75);
  --glass-3:        rgba(235,235,240,0.70);
  --glass-border:   rgba(0,0,0,0.10);
  --glass-border-2: rgba(0,0,0,0.06);

  --text-primary:   #000000;
  --text-secondary: rgba(60,60,67,0.60);
  --text-tertiary:  rgba(60,60,67,0.30);
  --text-quaternary:rgba(60,60,67,0.18);

  --fill-1: rgba(120,120,128,0.20);
  --fill-2: rgba(120,120,128,0.16);
  --fill-3: rgba(118,118,128,0.12);
  --fill-4: rgba(116,116,128,0.08);

  --sep: rgba(60,60,67,0.29);

  --blue:   #007aff;
  --green:  #34c759;
  --indigo: #5856d6;
  --orange: #ff9500;
  --pink:   #ff2d55;
  --purple: #af52de;
  --red:    #ff3b30;
  --teal:   #30b0c7;
  --yellow: #ffcc00;
  --cyan:   #32ade6;
  --mint:   #00c7be;

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.16);

  --grad-blue:   linear-gradient(135deg, #007aff, #5856d6);
  --grad-green:  linear-gradient(135deg, #34c759, #30b0c7);
  --grad-orange: linear-gradient(135deg, #ff9500, #ff2d55);
  --grad-purple: linear-gradient(135deg, #af52de, #5856d6);
}

/* ─────────────────────────────────────────
   BASE
──────────────────────────────────────────*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  font-family: var(--ff);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ─────────────────────────────────────────
   LAYOUT
──────────────────────────────────────────*/
.app {
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: max(env(safe-area-inset-bottom), 32px);
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ─────────────────────────────────────────
   STATUS BAR SPACER
──────────────────────────────────────────*/
.status-spacer {
  height: max(env(safe-area-inset-top), 44px);
  background: var(--bg-primary);
  transition: background 0.3s;
}

/* ─────────────────────────────────────────
   NAVIGATION BAR
──────────────────────────────────────────*/
.navbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--glass-1);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--sep);
  transition: background 0.3s;
}
.navbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 14px;
}
.nav-title-group { display: flex; flex-direction: column; gap: 1px; }
.nav-large-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.4px;
  color: var(--text-primary);
  transition: color 0.3s;
}
.nav-subtitle {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: -0.1px;
  transition: color 0.3s;
}
.nav-actions { display: flex; gap: 8px; align-items: center; }

/* SF Symbol-style icon buttons */
.nav-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: var(--fill-2);
  color: var(--blue);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.12s, color 0.3s;
  position: relative;
}
.nav-btn:active { transform: scale(0.88); background: var(--fill-3); }
.nav-btn svg { pointer-events: none; }

/* Theme toggle with animation */
.theme-toggle {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: var(--fill-2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.12s;
  overflow: hidden;
  position: relative;
}
.theme-toggle:active { transform: scale(0.88); }
.theme-icon {
  font-size: 17px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
  position: absolute;
}
.theme-icon.moon { opacity: 1; transform: rotate(0deg) scale(1); }
.theme-icon.sun  { opacity: 0; transform: rotate(90deg) scale(0.5); }
[data-scheme="light"] .theme-icon.moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
[data-scheme="light"] .theme-icon.sun  { opacity: 1; transform: rotate(0deg) scale(1); }

/* ─────────────────────────────────────────
   CONTENT AREA
──────────────────────────────────────────*/
.content { display: flex; flex-direction: column; gap: 12px; padding: 16px 16px 0; }

/* Section headers (like iOS Settings) */
.section-header {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: -0.1px;
  padding: 0 4px;
  margin-bottom: -4px;
  margin-top: 4px;
  transition: color 0.3s;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.4px;
}

/* ─────────────────────────────────────────
   CAMERA CARD
──────────────────────────────────────────*/
.camera-card {
  border-radius: 20px;
  overflow: hidden;
  background: #000;
  box-shadow: var(--shadow-md);
  position: relative;
}

.viewport {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  background: #000;
  overflow: hidden;
}
video, #det-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
video { opacity: 0; }

/* Viewfinder corners */
.vf-corner {
  position: absolute; width: 24px; height: 24px;
  z-index: 5; pointer-events: none;
  transition: opacity 0.4s;
}
.vf-corner.tl { top: 16px; left: 16px;
  border-top: 2.5px solid rgba(255,255,255,0.85);
  border-left: 2.5px solid rgba(255,255,255,0.85);
  border-radius: 5px 0 0 0; }
.vf-corner.tr { top: 16px; right: 16px;
  border-top: 2.5px solid rgba(255,255,255,0.85);
  border-right: 2.5px solid rgba(255,255,255,0.85);
  border-radius: 0 5px 0 0; }
.vf-corner.bl { bottom: 16px; left: 16px;
  border-bottom: 2.5px solid rgba(255,255,255,0.85);
  border-left: 2.5px solid rgba(255,255,255,0.85);
  border-radius: 0 0 0 5px; }
.vf-corner.br { bottom: 16px; right: 16px;
  border-bottom: 2.5px solid rgba(255,255,255,0.85);
  border-right: 2.5px solid rgba(255,255,255,0.85);
  border-radius: 0 0 5px 0; }

/* Scan line */
#scan-line {
  position: absolute; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,122,255,0.3) 20%,
    rgba(0,122,255,0.9) 50%,
    rgba(0,122,255,0.3) 80%,
    transparent 100%);
  box-shadow: 0 0 12px rgba(0,122,255,0.6), 0 0 4px rgba(0,122,255,1);
  z-index: 4; pointer-events: none;
  opacity: 0; transition: opacity 0.4s;
  animation: scanAnim 2.5s cubic-bezier(0.45,0,0.55,1) infinite;
}
#scan-line.on { opacity: 1; }
@keyframes scanAnim {
  0%   { top: 5%;  }
  50%  { top: 95%; }
  100% { top: 5%;  }
}

/* Flash */
#cam-flash {
  position: absolute; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 20;
  transition: opacity 0.06s linear;
}
#cam-flash.on { opacity: 0.75; }

/* Loading overlay */
#load-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 30;
  transition: opacity 0.5s ease;
}
#load-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.12);
  border-top-color: #0a84ff;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-label {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  letter-spacing: -0.2px;
  text-align: center; line-height: 1.6;
}

/* HUD: Target pill top-center */
#target-hud {
  position: absolute; top: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 8; pointer-events: none;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 20px; padding: 6px 14px;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform: translateX(-50%) translateY(-8px) scale(0.92);
  white-space: nowrap;
}
#target-hud.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}
.hud-live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #30d158;
  animation: livePulse 1.4s ease infinite;
}
@keyframes livePulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(1.5); }
}
.hud-target-name {
  font-size: 13px; font-weight: 600;
  color: #fff; letter-spacing: -0.2px;
}

/* Tap hint overlay */
#tap-hint {
  position: absolute; inset: 0; z-index: 7;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
#tap-hint.gone { opacity: 0; }
.tap-ring {
  width: 72px; height: 72px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: tapPulse 2.2s ease infinite;
}
.tap-ring::after {
  content: '';
  position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  animation: tapPulse 2.2s ease 0.4s infinite;
}
@keyframes tapPulse {
  0%,100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.1); opacity: 1; }
}
.tap-emoji { font-size: 30px; }
.tap-label {
  font-size: 14px; font-weight: 500;
  color: rgba(255,255,255,0.65);
  letter-spacing: -0.2px;
}

/* Tap ripple */
.tap-ripple {
  position: absolute; border-radius: 50%;
  width: 56px; height: 56px;
  border: 2px solid rgba(0,122,255,0.8);
  transform: translate(-50%,-50%) scale(0);
  pointer-events: none; z-index: 15;
  animation: rippleOut 0.55s ease-out forwards;
}
@keyframes rippleOut {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
}

/* Bottom HUD: count */
.cam-bottom-hud {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 48px 18px 18px;
  background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
  z-index: 6; pointer-events: none;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.hud-count-group { display: flex; flex-direction: column; gap: 1px; }
.hud-count-num {
  font-size: 64px;
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 1;
  color: #fff;
  transition: color 0.3s ease;
  -webkit-font-smoothing: antialiased;
}
.hud-count-num.targeted { color: #0a84ff; }
[data-scheme="light"] .hud-count-num.targeted { color: #0a84ff; }
.hud-count-label {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.60);
  letter-spacing: -0.1px;
}

/* Mode badge */
.mode-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.14);
  border-radius: 12px; padding: 5px 10px;
}
.mode-dot {
  width: 6px; height: 6px; border-radius: 50%;
  transition: background 0.3s;
}
.mode-dot.live    { background: #30d158; animation: livePulse 1.4s ease infinite; }
.mode-dot.frozen  { background: #0a84ff; animation: none; }
.mode-text {
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────
   CAMERA CONTROLS BAR
──────────────────────────────────────────*/
.cam-controls {
  background: var(--bg-secondary);
  border-radius: 0 0 20px 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  border-top: 0.5px solid var(--sep);
  overflow: hidden;
  transition: background 0.3s;
}
.cam-ctrl-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; padding: 14px 8px;
  border: none; background: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
  position: relative;
}
.cam-ctrl-btn:active { background: var(--fill-2); }
.cam-ctrl-btn + .cam-ctrl-btn::before {
  content: '';
  position: absolute; left: 0; top: 14px; bottom: 14px;
  width: 0.5px;
  background: var(--sep);
}
.ctrl-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: transform 0.15s;
}
.cam-ctrl-btn:active .ctrl-icon { transform: scale(0.88); }
.ctrl-icon.blue-grad   { background: var(--grad-blue); }
.ctrl-icon.green-grad  { background: var(--grad-green); }
.ctrl-icon.orange-grad { background: var(--grad-orange); }
.ctrl-icon.red-fill    { background: rgba(255,69,58,0.15); }
.ctrl-icon.red-fill svg { color: var(--red); }
.ctrl-label {
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: -0.1px;
  transition: color 0.3s;
}

/* ─────────────────────────────────────────
   STATS CARD (Grouped)
──────────────────────────────────────────*/
.stats-card {
  background: var(--bg-secondary);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
}
.stat-row {
  display: flex; align-items: center;
  padding: 13px 16px;
  border-bottom: 0.5px solid var(--sep);
  gap: 12px;
  transition: border-color 0.3s;
}
.stat-row:last-child { border-bottom: none; }
.stat-icon-wrap {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.stat-row-content { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.stat-row-label {
  font-size: 16px; font-weight: 400;
  color: var(--text-primary); letter-spacing: -0.3px;
  transition: color 0.3s;
}
.stat-row-sub {
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary); letter-spacing: -0.1px;
  transition: color 0.3s;
}
.stat-row-value {
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.5px;
  transition: color 0.3s;
}

/* ─────────────────────────────────────────
   RESULT CARD — Collapsible
──────────────────────────────────────────*/
.result-card {
  background: var(--bg-secondary);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1),
              opacity 0.3s ease,
              background 0.3s;
}
.result-card.open { max-height: 600px; opacity: 1; }
.rc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 0.5px solid var(--sep);
  transition: border-color 0.3s;
}
.rc-header-left { display: flex; flex-direction: column; gap: 1px; }
.rc-title {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary); letter-spacing: -0.3px;
  transition: color 0.3s;
}
.rc-subtitle {
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary);
  transition: color 0.3s;
}
.rc-badge {
  font-size: 14px; font-weight: 600;
  background: rgba(0,122,255,0.12);
  color: var(--blue);
  padding: 4px 12px; border-radius: 20px;
  letter-spacing: -0.2px;
  transition: color 0.3s, background 0.3s;
}
.rc-list { padding: 8px 0; }
.rc-item {
  display: flex; align-items: center;
  padding: 10px 16px; gap: 12px;
  transition: background 0.15s;
}
.rc-item:active { background: var(--fill-4); }
.rc-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rc-item-name {
  flex: 1;
  font-size: 15px; font-weight: 400;
  color: var(--text-primary); letter-spacing: -0.2px;
  transition: color 0.3s;
}
.rc-item-name.highlight { font-weight: 600; }
.rc-bar-wrap {
  flex: 2; height: 4px;
  background: var(--fill-3); border-radius: 2px;
  overflow: hidden;
  transition: background 0.3s;
}
.rc-bar { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.rc-item-count {
  font-size: 15px; font-weight: 600;
  color: var(--text-secondary); min-width: 24px;
  text-align: right; letter-spacing: -0.3px;
  transition: color 0.3s;
}

/* ─────────────────────────────────────────
   SLIDER CARD
──────────────────────────────────────────*/
.slider-card {
  background: var(--bg-secondary);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
}
.slider-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.slider-label {
  font-size: 15px; font-weight: 400;
  color: var(--text-primary); letter-spacing: -0.2px;
  transition: color 0.3s;
}
.slider-value {
  font-size: 15px; font-weight: 600;
  color: var(--blue); letter-spacing: -0.3px;
  min-width: 40px; text-align: right;
  transition: color 0.3s;
}
/* Apple-style range slider */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 28px;
  background: transparent;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 5px; border-radius: 2.5px;
  background: linear-gradient(90deg,
    var(--blue) 0%,
    var(--blue) var(--pct,30%),
    var(--fill-3) var(--pct,30%),
    var(--fill-3) 100%);
  transition: background 0.2s;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25), 0 0 0 0.5px rgba(0,0,0,0.12);
  margin-top: -10.5px;
  transition: transform 0.12s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.12); }

/* ─────────────────────────────────────────
   HISTORY CARD
──────────────────────────────────────────*/
.history-card {
  background: var(--bg-secondary);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
}
.hist-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 0.5px solid var(--sep);
  transition: border-color 0.3s;
}
.hist-title {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary); letter-spacing: -0.3px;
  transition: color 0.3s;
}
.hist-clear-btn {
  font-size: 14px; font-weight: 400;
  color: var(--red); background: none; border: none;
  cursor: pointer; padding: 2px 0;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: -0.2px;
  transition: opacity 0.15s;
}
.hist-clear-btn:active { opacity: 0.6; }
.hist-list { max-height: 260px; overflow-y: auto; }
.hist-empty {
  text-align: center; padding: 24px 16px;
  font-size: 14px; font-weight: 400;
  color: var(--text-tertiary); letter-spacing: -0.1px;
  transition: color 0.3s;
}
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-bottom: 0.5px solid var(--sep);
  animation: histSlide 0.25s ease;
  transition: background 0.15s, border-color 0.3s;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:active { background: var(--fill-4); }
@keyframes histSlide {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: none; }
}
.hist-thumb {
  width: 52px; height: 40px; border-radius: 8px;
  object-fit: cover; flex-shrink: 0;

}
.hist-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.hist-target {

}
.hist-meta {

<script>
(function () {
'use strict';

/* ── THEME ── */
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
let isDark = !window.matchMedia('(prefers-color-scheme: light)').matches;
function applyTheme() {
  html.setAttribute('data-scheme', isDark ? 'dark' : 'light');
}
applyTheme();
themeBtn.addEventListener('click', () => { isDark = !isDark; applyTheme(); });

/* ── COLOUR PALETTE (Apple-like vibrant) ── */
const PALETTE = [
  { hex: '#0a84ff', name: 'blue'   },
  { hex: '#30d158', name: 'green'  },
  { hex: '#ff9f0a', name: 'orange' },
  { hex: '#bf5af2', name: 'purple' },
  { hex: '#ff375f', name: 'pink'   },
  { hex: '#40c8e0', name: 'teal'   },
  { hex: '#ffd60a', name: 'yellow' },
  { hex: '#5e5ce6', name: 'indigo' },
];
const classColor = {};
let colorIdx = 0;
function colorFor(cls) {
  if (!classColor[cls]) classColor[cls] = PALETTE[colorIdx++ % PALETTE.length].hex;
  return classColor[cls];
}
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ── STATE ── */
let model = null, stream = null;
let frozen = false, rafId = null;
let confThresh = 0.40;
let allRaw = [];
let targetClass = null;
let frozenPixels = null;
let lastThumb = '';
let lastDetectTs = 0;
const snapHistory = [];

/* ── DOM ── */
const video      = document.getElementById('video');
const canvas     = document.getElementById('det-canvas');
const ctx        = canvas.getContext('2d');
const loadOv     = document.getElementById('load-overlay');
const loadTxt    = document.getElementById('load-txt');
const scanLine   = document.getElementById('scan-line');
const camFlash   = document.getElementById('cam-flash');
const viewport   = document.getElementById('viewport');
const bigNum     = document.getElementById('bigNum');
const hudLabel   = document.getElementById('hudLabel');
const modeDot    = document.getElementById('modeDot');
const modeText   = document.getElementById('modeText');
const tapHint    = document.getElementById('tap-hint');
const targetHud  = document.getElementById('target-hud');
const hudName    = document.getElementById('hud-name');
const stTarget   = document.getElementById('st-target');
const stAll      = document.getElementById('st-all');
const stConf     = document.getElementById('st-conf');
const stTypes    = document.getElementById('st-types');
const resultCard = document.getElementById('result-card');
const rcTitle    = document.getElementById('rc-title');
const rcSub      = document.getElementById('rc-sub');
const rcBadge    = document.getElementById('rc-badge');
const rcList     = document.getElementById('rc-list');
const histListEl = document.getElementById('hist-list');
const confSlider = document.getElementById('conf-slider');
const confValEl  = document.getElementById('conf-val');

/* ── SLIDER ── */
function updateSlider(el) {
  const v = +el.value;
  confThresh = v / 100;
  confValEl.textContent = v + '%';
  const pct = ((v - 10) / 80 * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
  if (allRaw.length) redraw();
}
confSlider.addEventListener('input', function () { updateSlider(this); });
updateSlider(confSlider);

/* ── DRAW UTILS ── */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawOverlay(preds) {
  preds.forEach((p, i) => {
    const [x, y, w, h] = p.bbox;
    const col = colorFor(p.class);
    const pct = Math.round(p.score * 100);
    const isTarget = p.class === targetClass;
    const alpha = isTarget ? 1 : (targetClass ? 0.35 : 0.85);

    ctx.save();
    ctx.globalAlpha = alpha;

    /* box */
    ctx.shadowColor = col;
    ctx.shadowBlur = isTarget ? 16 : 6;
    ctx.strokeStyle = col;
    ctx.lineWidth = isTarget ? 2.5 : 1.5;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.shadowBlur = 0;

    /* fill for target */
    if (isTarget) {
      ctx.fillStyle = hexAlpha(col, 0.10);
      ctx.fillRect(x, y, w, h);

      /* corner ticks */
      const tk = 14;
      ctx.strokeStyle = col; ctx.lineWidth = 3;
      ctx.shadowColor = col; ctx.shadowBlur = 8;
      [[x,y,x+tk,y],[x+w-tk,y,x+w,y],
       [x,y+h-tk,x,y+h],[x+w,y+h-tk,x+w,y+h]]
      .forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      });
      ctx.shadowBlur = 0;
    }

    /* label */
    ctx.font = `${isTarget?'600':'500'} ${isTarget?12:11}px -apple-system, SF Pro Text, sans-serif`;
    const lbl = isTarget ? `${p.class}  ${pct}%` : `${p.class}`;
    const tw = ctx.measureText(lbl).width;
    const lbH = isTarget ? 22 : 18;
    const lbW = tw + (isTarget ? 16 : 12);

    /* label bg */
    const ly = Math.max(y - lbH - 4, 2);
    ctx.fillStyle = isTarget ? hexAlpha(col, 0.88) : 'rgba(0,0,0,0.60)';
    rr(x, ly, lbW, lbH + 2, 4);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.fillText(lbl, x + (isTarget ? 8 : 6), ly + lbH - 3);

    /* number badge — target only */
    if (isTarget) {
      ctx.font = '700 13px -apple-system, SF Pro Text, sans-serif';
      ctx.fillStyle = hexAlpha(col, 1);
      ctx.shadowColor = col; ctx.shadowBlur = 8;
      ctx.fillText(`#${i+1}`, x + 7, y + 18);
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  });
}

function drawLive(preds) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  drawOverlay(preds);
}

/* ── FILTER ── */
function getFiltered() {
  const pass = allRaw.filter(p => p.score > confThresh);
  if (!targetClass) return pass;
  return pass.filter(p => p.class === targetClass);
}

/* ── REDRAW (frozen) ── */
function redraw() {
  const filtered = getFiltered();
  if (frozen && frozenPixels) {
    ctx.putImageData(frozenPixels, 0, 0);
    const allPass = allRaw.filter(p => p.score > confThresh);
    drawOverlay(allPass);
  }
  updateUI(filtered, allRaw.filter(p => p.score > confThresh));
}

/* ── UI UPDATE ── */
function updateUI(targetPreds, allPreds) {
  const n = targetPreds.length;
  const total = allPreds.length;

  /* big number */
  bigNum.textContent = n;
  bigNum.classList.toggle('targeted', !!targetClass);
  hudLabel.textContent = targetClass ? `× ${targetClass}` : '件物件';

  /* stats */
  stTarget.textContent = n;
  stAll.textContent = total;
  if (allPreds.length) {
    const best = allPreds.reduce((a,b) => a.score > b.score ? a : b);
    stConf.textContent = Math.round(best.score * 100) + '%';
    const types = new Set(allPreds.map(p => p.class)).size;
    stTypes.textContent = types;
  } else {
    stConf.textContent = '—';
    stTypes.textContent = '—';
  }

  /* result card */
  if (allPreds.length > 0) {
    const groups = {};
    allPreds.forEach(p => { groups[p.class] = (groups[p.class]||0)+1; });
    const sorted = Object.entries(groups).sort((a,b)=>b[1]-a[1]);
    const maxN = sorted[0][1];

    rcTitle.textContent = targetClass ? `目標：${targetClass}` : '全部物件';
    rcSub.textContent = targetClass
      ? `找到 ${n} 件 ${targetClass}`
      : `共 ${total} 件 · ${sorted.length} 種類別`;
    rcBadge.textContent = n + ' 件';

    rcList.innerHTML = sorted.map(([cls, cnt]) => {
      const col = colorFor(cls);
      const bar = Math.round(cnt / maxN * 100);
      const isT = cls === targetClass;
      return `<div class="rc-item">
        <div class="rc-color-dot" style="background:${col}"></div>
        <div class="rc-item-name${isT?' highlight':''}" style="${isT?'color:'+col:''}">${cls}</div>
        <div class="rc-bar-wrap">
          <div class="rc-bar" style="width:${bar}%;background:${col}"></div>
        </div>
        <div class="rc-item-count" style="${isT?'color:'+col+';font-weight:700':''}">${cnt}</div>
      </div>`;
    }).join('');
    resultCard.classList.add('open');
  } else {
    resultCard.classList.remove('open');
  }
}

/* ── DETECTION LOOP ── */
async function detectFrame() {
  if (!model || frozen || video.readyState !== 4 || !video.videoWidth) return;
  try {
    const raw = await model.detect(video);
    if (frozen) return;
    allRaw = raw;
    const filtered = getFiltered();
    const allPass = raw.filter(p => p.score > confThresh);
    drawLive(allPass);      // draw all with alpha, target full
    updateUI(filtered, allPass);
  } catch (e) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }
}

function loop(ts) {
  if (!frozen) {
    if (model && video.readyState === 4 && video.videoWidth) {
      if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      if (ts - lastDetectTs > 210) {
        lastDetectTs = ts;
        detectFrame();
      } else {
        const allPass = allRaw.filter(p => p.score > confThresh);
        drawLive(allPass);
      }
    }
  }
  rafId = requestAnimationFrame(loop);
}

/* ── TAP TO SELECT ── */
canvas.addEventListener('click', e => {
  if (!allRaw.length) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top)  * scaleY;

  /* ripple */
  const rip = document.createElement('div');
  rip.className = 'tap-ripple';
  rip.style.left = (e.clientX - rect.left) + 'px';
  rip.style.top  = (e.clientY - rect.top) + 'px';
  viewport.appendChild(rip);
  setTimeout(() => rip.remove(), 700);

  /* hit test */
  const pass = allRaw.filter(p => p.score > confThresh);
  let hit = null;
  for (let i = pass.length - 1; i >= 0; i--) {
    const [x,y,w,h] = pass[i].bbox;
    if (cx >= x && cx <= x+w && cy >= y && cy <= y+h) { hit = pass[i]; break; }
  }

  if (hit) {
    setTarget(targetClass === hit.class ? null : hit.class);
  } else {
    setTarget(null);
  }
});

function setTarget(cls) {
  targetClass = cls;
  tapHint.classList.add('gone');
  if (cls) {
    hudName.textContent = cls;
    targetHud.classList.add('show');
  } else {
    targetHud.classList.remove('show');
  }
  redraw();
}

/* ── FREEZE / LIVE ── */
document.getElementById('btnFreeze').addEventListener('click', () => {
  if (frozen || !model || video.readyState !== 4) return;
  camFlash.classList.add('on');
  setTimeout(() => camFlash.classList.remove('on'), 150);
  frozen = true;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  frozenPixels = ctx.getImageData(0, 0, canvas.width, canvas.height);

  scanLine.classList.remove('on');
  modeDot.className = 'mode-dot frozen';
  modeText.textContent = 'FROZEN';

  model.detect(video).then(raw => {
    allRaw = raw;
    const allPass = raw.filter(p => p.score > confThresh);
    ctx.putImageData(frozenPixels, 0, 0);
    drawOverlay(allPass);
    updateUI(getFiltered(), allPass);
    lastThumb = canvas.toDataURL('image/jpeg', 0.65);
  }).catch(() => { lastThumb = canvas.toDataURL('image/jpeg', 0.65); });
});

document.getElementById('btnLive').addEventListener('click', () => {
  frozen = false; frozenPixels = null; allRaw = [];
  scanLine.classList.add('on');
  modeDot.className = 'mode-dot live';
  modeText.textContent = 'LIVE';
  updateUI([], []);
});

document.getElementById('btnClear').addEventListener('click', () => {
  setTarget(null);
  tapHint.classList.remove('gone');
});

/* ── SAVE ── */
document.getElementById('btnSave').addEventListener('click', () => {
  const thumb = lastThumb || canvas.toDataURL('image/jpeg', 0.55);
  const t = new Date().toLocaleTimeString('zh-TW', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  const filtered = getFiltered();
  snapHistory.unshift({
    thumb,
    target: targetClass || '全部',
    count: filtered.length,
    time: t
  });
  if (snapHistory.length > 12) snapHistory.pop();
  lastThumb = '';
  renderHistory();
});

document.getElementById('clearHistBtn').addEventListener('click', () => {
  snapHistory.length = 0;
  renderHistory();
});

function renderHistory() {
  if (!snapHistory.length) {
    histListEl.innerHTML = '<div class="hist-empty">尚無拍照紀錄</div>';
    return;
  }
  histListEl.innerHTML = snapHistory.map((h, i) => `
    <div class="hist-item">
      <img class="hist-thumb" src="${h.thumb}" alt="">
      <div class="hist-info">
        <div class="hist-target">${h.target}</div>
        <div class="hist-meta">${h.time}</div>
      </div>
      <div class="hist-count">${h.count}</div>
      <button class="hist-del" data-i="${i}" aria-label="刪除">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </button>
    </div>`).join('');
  histListEl.querySelectorAll('.hist-del').forEach(btn => {
    btn.addEventListener('click', function () {
      snapHistory.splice(+this.dataset.i, 1);
      renderHistory();
    });
  });
}

/* ── FLIP ── */
let facingMode = 'environment';
document.getElementById('flipBtn').addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  frozen = false; frozenPixels = null; allRaw = [];
  scanLine.classList.add('on');
  modeDot.className = 'mode-dot live'; modeText.textContent = 'LIVE';
  try { await startCam(); } catch(e) { loadTxt.textContent = '無法切換鏡頭'; }
});

/* ── CAMERA ── */
async function startCam() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 960 } },
    audio: false
  });
  video.srcObject = stream;
  return new Promise(res => {
    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      res();
    };
  });
}

/* ── INIT ── */
async function init() {
  try {
    loadTxt.innerHTML = '載入 AI 模型中<br>首次約 15 MB';
    model = await cocoSsd.load({ base: 'mobilenet_v2' });
    loadTxt.textContent = '開啟相機…';
    await startCam();
    loadOv.classList.add('hidden');
    scanLine.classList.add('on');
    rafId = requestAnimationFrame(loop);
  } catch (e) {
    document.querySelector('.spinner').style.display = 'none';
    loadTxt.innerHTML = '❌ 初始化失敗<br><span style="font-size:11px;opacity:.5">' +
      (e.message || '請確認相機權限後重整頁面') + '</span>';
  }
}

document.readyState === 'loading'
  ? document.addEventListener('DOMContentLoaded', init)
  : init();

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { cancelAnimationFrame(rafId); rafId = null; }
  else if (model && !rafId && !frozen) rafId = requestAnimationFrame(loop);
});

})();
</script>
</body>
