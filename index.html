<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>零件盤點計數器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --surface2: #1e242b;
    --border: #2a333d;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --ok: #39ff14;
    --warn: #ffdd00;
    --text: #c8d8e8;
    --text-dim: #5a6a7a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,.018) 2px, rgba(0,229,255,.018) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--bg);
    font-weight: bold;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  #lang-btn {
    font-family: var(--mono);
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
    border-radius: 2px;
  }
  #lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Status bar ── */
  .statusbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .statusbar .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 2s infinite;
  }
  .statusbar .dot.active { background: var(--ok); }
  .statusbar .dot.warn { background: var(--warn); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 0;
    height: calc(100vh - 90px);
  }
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; height: auto; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); }
  }

  /* ── Viewport ── */
  .viewport-wrap {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #camera-view {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #canvas-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    cursor: crosshair;
    max-width: 100%;
    max-height: 100%;
  }

  /* corner brackets */
  .corner { position: absolute; width: 30px; height: 30px; }
  .corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
  .corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

  .center-cross {
    position: absolute;
    width: 20px; height: 20px;
    opacity: 0.3;
    pointer-events: none;
  }
  .center-cross::before, .center-cross::after {
    content: ''; position: absolute;
    background: var(--accent);
  }
  .center-cross::before { width: 100%; height: 1px; top: 50%; left: 0; }
  .center-cross::after { width: 1px; height: 100%; left: 50%; top: 0; }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  /* ── Counter ── */
  .counter-section {
    padding: 16px 14px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .count-big {
    font-family: var(--mono);
    font-size: 72px;
    line-height: 1;
    color: var(--ok);
    text-shadow: 0 0 20px rgba(57,255,20,.4);
    transition: all .15s;
  }
  .count-big.bump { transform: scale(1.15); }
  .count-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── Marker list ── */
  .marker-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .marker-list::-webkit-scrollbar { width: 4px; }
  .marker-list::-webkit-scrollbar-track { background: transparent; }
  .marker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .marker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid rgba(255,255,255,.04);
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:none} }
  .marker-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--ok);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: var(--ok);
    flex-shrink: 0;
  }
  .marker-coord { color: var(--text-dim); font-size: 10px; }

  /* ── AI section ── */
  .ai-section {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .ai-result {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-height: 30px;
    line-height: 1.6;
  }
  .ai-result .ai-count {
    color: var(--warn);
    font-size: 16px;
    font-weight: bold;
  }

  /* ── Buttons ── */
  .btn-group {
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 14px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    text-transform: uppercase;
    transition: all .15s;
    font-weight: bold;
    text-align: left;
  }
  .btn:active { transform: scale(.97); }
  .btn svg { flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: #33ecff; box-shadow: 0 0 12px rgba(0,229,255,.3); }

  .btn-ai {
    background: linear-gradient(135deg, #7b2ff7, #f107a3);
    color: white;
  }
  .btn-ai:hover { opacity: .9; box-shadow: 0 0 12px rgba(123,47,247,.4); }

  .btn-warn {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--warn);
  }
  .btn-warn:hover { background: rgba(255,221,0,.1); }

  .btn-danger {
    background: transparent;
    color: #ff4d4d;
    border: 1px solid #ff4d4d;
  }
  .btn-danger:hover { background: rgba(255,77,77,.1); }

  .btn-success {
    background: transparent;
    color: var(--ok);
    border: 1px solid var(--ok);
  }
  .btn-success:hover { background: rgba(57,255,20,.1); }

  .btn[disabled] { opacity: .35; cursor: not-allowed; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 3px;
    transition: transform .3s ease;
    letter-spacing: 1px;
    z-index: 10000;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▣</div>
    <div>
      <div class="logo-text" id="title-text">PARTS INVENTORY</div>
      <div class="logo-sub" id="title-sub">零件盤點計數器</div>
    </div>
  </div>
  <button id="lang-btn" onclick="toggleLang()">VI</button>
</header>

<div class="statusbar">
  <span class="dot" id="status-dot"></span>
  <span id="status-msg">READY — 點擊「開啟相機」開始</span>
</div>

<div class="main">
  <!-- Viewport -->
  <div class="viewport-wrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="center-cross"></div>
    <video id="camera-view" autoplay playsinline></video>
    <canvas id="canvas-overlay"></canvas>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel-title" id="panel-count-title">COUNT</div>

    <div class="counter-section">
      <div class="count-big" id="count-num">0</div>
      <div class="count-label" id="count-label">已標記零件</div>
    </div>

    <div class="panel-title" id="panel-ai-title">AI DETECT</div>
    <div class="ai-section">
      <div class="ai-result" id="ai-result">— 拍照後可用 AI 自動識別零件數量</div>
    </div>

    <div class="panel-title" id="panel-marks-title">MARKERS</div>
    <div class="marker-list" id="marker-list"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btn-start" onclick="startCamera()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
        <span id="btn-start-txt">開啟相機</span>
      </button>
      <button class="btn btn-primary" id="btn-snap" onclick="takeSnapshot()" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span id="btn-snap-txt">拍照</span>
      </button>
      <button class="btn btn-ai" id="btn-ai" onclick="runAiDetect()" style="display:none" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span id="btn-ai-txt">AI 自動計數</span>
      </button>
      <button class="btn btn-warn" id="btn-undo" onclick="undoLast()" style="display:none" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        <span id="btn-undo-txt">撤銷</span>
      </button>
      <button class="btn btn-success" id="btn-save" onclick="downloadImage()" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="btn-save-txt">儲存圖片</span>
      </button>
      <button class="btn btn-danger" onclick="resetAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        <span id="btn-reset-txt">重設</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const video = document.getElementById('camera-view');
const canvas = document.getElementById('canvas-overlay');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('count-num');
const statusDot = document.getElementById('status-dot');
const statusMsg = document.getElementById('status-msg');

let lang = 'zh';
let markers = [];
let bgImage = null;
let bgDataUrl = null;

const T = {
  zh: {
    title: 'PARTS INVENTORY', sub: '零件盤點計數器',
    ready: 'READY — 點擊「開啟相機」開始',
    camActive: 'CAMERA ACTIVE — 對準零件後拍照',
    snapped: 'SNAPSHOT — 點擊畫面標記零件',
    countLabel: '已標記零件',
    panelCount: 'COUNT', panelAi: 'AI DETECT', panelMarks: 'MARKERS',
    btnStart: '開啟相機', btnSnap: '拍照', btnAi: 'AI 自動計數',
    btnUndo: '撤銷', btnSave: '儲存圖片', btnReset: '重設',
    aiWaiting: '— 拍照後可用 AI 自動識別零件數量',
    aiLoading: '正在分析圖像...',
    aiError: '無法連接 AI，請手動標記',
    confirmReset: '確定要重設嗎？資料將消失。',
    saved: '圖片已儲存！',
    lang: 'VI',
    markerLabel: (n, x, y) => `#${n} (${Math.round(x)}, ${Math.round(y)})`,
  },
  vi: {
    title: 'KIỂM KÊ LINH KIỆN', sub: 'Công cụ kiểm kê linh kiện',
    ready: 'READY — Nhấn "Mở camera" để bắt đầu',
    camActive: 'CAMERA BẬT — Hướng vào linh kiện rồi chụp',
    snapped: 'ĐÃ CHỤP — Nhấn vào ảnh để đánh dấu',
    countLabel: 'Linh kiện đã đánh dấu',
    panelCount: 'SỐ ĐẾM', panelAi: 'AI TỰ ĐỘNG', panelMarks: 'ĐIỂM ĐÁNH DẤU',
    btnStart: 'Mở camera', btnSnap: 'Chụp ảnh', btnAi: 'AI tự đếm',
    btnUndo: 'Hoàn tác', btnSave: 'Lưu ảnh', btnReset: 'Đặt lại',
    aiWaiting: '— Chụp ảnh để AI nhận diện số lượng linh kiện',
    aiLoading: 'Đang phân tích hình ảnh...',
    aiError: 'Không kết nối được AI, hãy đánh dấu thủ công',
    confirmReset: 'Bạn có chắc muốn đặt lại không?',
    saved: 'Đã lưu ảnh!',
    lang: 'ZH',
    markerLabel: (n, x, y) => `#${n} (${Math.round(x)}, ${Math.round(y)})`,
  }
};

function t(k, ...args) {
  const v = T[lang][k];
  return typeof v === 'function' ? v(...args) : v;
}

function setUI() {
  document.getElementById('title-text').textContent = t('title');
  document.getElementById('title-sub').textContent = t('sub');
  document.getElementById('count-label').textContent = t('countLabel');
  document.getElementById('panel-count-title').textContent = t('panelCount');
  document.getElementById('panel-ai-title').textContent = t('panelAi');
  document.getElementById('panel-marks-title').textContent = t('panelMarks');
  document.getElementById('btn-start-txt').textContent = t('btnStart');
  document.getElementById('btn-snap-txt').textContent = t('btnSnap');
  document.getElementById('btn-ai-txt').textContent = t('btnAi');
  document.getElementById('btn-undo-txt').textContent = t('btnUndo');
  document.getElementById('btn-save-txt').textContent = t('btnSave');
  document.getElementById('btn-reset-txt').textContent = t('btnReset');
  document.getElementById('lang-btn').textContent = t('lang');
}

function toggleLang() {
  lang = lang === 'zh' ? 'vi' : 'zh';
  setUI();
}

function setStatus(key, active = false, warn = false) {
  statusMsg.textContent = t(key);
  statusDot.className = 'dot' + (active ? ' active' : warn ? ' warn' : '');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    video.srcObject = stream;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-snap').style.display = 'flex';
    setStatus('camActive', true);
  } catch (e) {
    alert('無法開啟相機，請確認相機權限。');
  }
}

function takeSnapshot() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  bgDataUrl = canvas.toDataURL('image/jpeg', 0.92);
  bgImage = new Image();
  bgImage.src = bgDataUrl;

  // Stop stream
  const stream = video.srcObject;
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.style.display = 'none';
  canvas.style.display = 'block';

  document.getElementById('btn-snap').style.display = 'none';
  document.getElementById('btn-ai').style.display = 'flex';
  document.getElementById('btn-ai').disabled = false;
  document.getElementById('btn-undo').style.display = 'flex';
  document.getElementById('btn-save').style.display = 'flex';

  setStatus('snapped', false, true);
}

canvas.addEventListener('click', function(e) {
  if (!bgImage) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  addMarker(x, y);
});

function addMarker(x, y) {
  markers.push({ x, y });
  document.getElementById('btn-undo').disabled = false;
  bumpCount();
  drawAll();
  updateMarkerList();
}

function bumpCount() {
  countEl.classList.remove('bump');
  void countEl.offsetWidth;
  countEl.classList.add('bump');
  setTimeout(() => countEl.classList.remove('bump'), 150);
}

function drawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bgImage, 0, 0);

  markers.forEach((m, i) => {
    const r = Math.max(20, canvas.width * 0.025);
    // outer ring
    ctx.beginPath();
    ctx.arc(m.x, m.y, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(57,255,20,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // filled circle
    ctx.beginPath();
    ctx.arc(m.x, m.y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(57,255,20,0.18)';
    ctx.fill();
    ctx.strokeStyle = '#39ff14';
    ctx.lineWidth = Math.max(2, canvas.width * 0.004);
    ctx.stroke();

    // number
    const fs = Math.max(16, r * 0.9);
    ctx.font = `bold ${fs}px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = 'rgba(57,255,20,0.7)';
    ctx.shadowBlur = 8;
    ctx.fillText(i + 1, m.x, m.y);
    ctx.shadowBlur = 0;
  });

  countEl.textContent = markers.length;
}

function updateMarkerList() {
  const list = document.getElementById('marker-list');
  list.innerHTML = '';
  markers.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'marker-item';
    div.innerHTML = `<div class="marker-dot">${i+1}</div><span class="marker-coord">${Math.round(m.x)}, ${Math.round(m.y)}</span>`;
    list.appendChild(div);
  });
  list.scrollTop = list.scrollHeight;
}

function undoLast() {
  if (!markers.length) return;
  markers.pop();
  drawAll();
  updateMarkerList();
  if (!markers.length) document.getElementById('btn-undo').disabled = true;
}

function resetAll() {
  if (!confirm(t('confirmReset'))) return;
  location.reload();
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `inventory-${Date.now()}.jpg`;
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
  toast(t('saved'));
}

// ── AI Auto-Detect ──
async function runAiDetect() {
  const btn = document.getElementById('btn-ai');
  const resultEl = document.getElementById('ai-result');
  btn.disabled = true;
  resultEl.innerHTML = `<span class="spinner"></span> ${t('aiLoading')}`;

  try {
    const base64 = bgDataUrl.split(',')[1];
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
            },
            {
              type: 'text',
              text: `You are a factory parts inventory assistant. Look at this image carefully and count all the individual parts/components/objects you can see.

Respond ONLY with a JSON object like this (no markdown, no extra text):
{"count": <number>, "description": "<brief description in ${lang === 'zh' ? 'Traditional Chinese' : 'Vietnamese'}>", "positions": [{"x": <0-1 relative x>, "y": <0-1 relative y>}]}

Include approximate relative positions (0 to 1) for each detected part so they can be plotted on the image. Be precise with counting.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(c => c.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Plot AI markers
    if (parsed.positions && parsed.positions.length) {
      markers = parsed.positions.map(p => ({
        x: p.x * canvas.width,
        y: p.y * canvas.height
      }));
      drawAll();
      updateMarkerList();
    }

    resultEl.innerHTML = `AI: <span class="ai-count">${parsed.count}</span> 個零件<br><small style="color:var(--text-dim)">${parsed.description}</small>`;
  } catch (e) {
    resultEl.textContent = t('aiError');
    btn.disabled = false;
  }
}

// Init
setUI();
setStatus('ready');
